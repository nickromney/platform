apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-application-sentiment-to-subnetcalc
spec:
  description: >-
    Hard isolation for the kindlocal project across every application
    namespace. Pods labeled app=sentiment-llm may not talk to pods labeled
    app=subnetcalc, regardless of environment.
  endpointSelector:
    matchLabels:
      "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment-llm
  egressDeny:
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
  ingressDeny:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
---
