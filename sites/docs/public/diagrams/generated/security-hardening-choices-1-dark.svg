ass="shape" ><rect x="12.000000" y="12.000000" width="720.000000" height="192.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="75.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Hardening choices</tspan><tspan x="372.000000" dy="21.200000">The stack narrows exposure,</tspan><tspan x="372.000000" dy="21.200000">constrains inputs, then verifies</tspan><tspan x="372.000000" dy="21.200000">runtime behaviour.</tspan><tspan x="372.000000" dy="21.200000">Exposure</tspan></text></g><g class="bjAy"><g class="shape" ><rect x="12.000000" y="274.000000" width="720.000000" height="136.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="329.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Supply chain</tspan><tspan x="372.000000" dy="22.000000">Images</tspan><tspan x="372.000000" dy="22.000000">Runtime policy</tspan></text></g><g class="bjAz"><g class="shape" ><rect x="12.000000" y="480.000000" width="720.000000" height="164.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="539.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Validation</tspan><tspan x="372.000000" dy="21.500000">Local exposure boundary</tspan><tspan x="372.000000" dy="21.500000">localhost admin surfaces by</tspan><tspan x="372.000000" dy="21.500000">default</tspan></text></g><g class="bjA0"><g class="shape" ><rect x="12.000000" y="714.000000" width="720.000000" height="164.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="773.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Gateway TLS and explicit binds</tspan><tspan x="372.000000" dy="21.500000">hostnames, trusted proxies, and</tspan><tspan x="372.000000" dy="21.500000">allowlists are deliberate</tspan><tspan x="372.000000" dy="21.500000">Pinned inputs</tspan></text></g><g class="bjA1"><g class="shape" ><rect x="12.000000" y="948.000000" width="720.000000" height="192.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="1011.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">workflow SHAs, lockfiles, vendored</tspan><tspan x="372.000000" dy="21.200000">commits</tspan><tspan x="372.000000" dy="21.200000">Small sample-app ecosystems</tspan><tspan x="372.000000" dy="21.200000">minimal dependency graphs reduce</tspan><tspan x="372.000000" dy="21.200000">review surface</tspan></text></g><g class="bjA2"><g class="shape" ><rect x="12.000000" y="1210.000000" width="720.000000" height="164.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="1269.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Hardened images</tspan><tspan x="372.000000" dy="21.500000">Docker Hardened Images where</tspan><tspan x="372.000000" dy="21.500000">practical</tspan><tspan x="372.000000" dy="21.500000">Multi-stage build boundary</tspan></text></g><g class="bjA3"><g class="shape" ><rect x="12.000000" y="1444.000000" width="720.000000" height="192.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="1507.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">copy compiled artefacts, not build</tspan><tspan x="372.000000" dy="21.200000">toolchains</tspan><tspan x="372.000000" dy="21.200000">Container restrictions</tspan><tspan x="372.000000" dy="21.200000">non-root, read-only FS, dropped</tspan><tspan x="372.000000" dy="21.200000">capabilities</tspan></text></g><g class="bjA4"><g class="shape" ><rect x="12.000000" y="1706.000000" width="720.000000" height="164.000000" rx="10.000000" stroke="#CBA6f7" fill="#313244" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="1765.000000" fill="#CDD6F4" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Cilium and Kyverno controls</tspan><tspan x="372.000000" dy="21.500000">default-deny, L7 policy, labels,</tspan><tspan x="372.000000" dy="21.500000">admission defaults</tspan><tspan x="372.000000" dy="21.500000">Evidence and checks</tspan></text></g><g class="KG4wMSAtJmd0OyBuMDIpWzBd"><marker id="mk-d2-4090143152-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#CBA6f7" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 372.000000 206.000000 L 372.000000 270.000000" stroke="#CBA6f7" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-4090143152-3488378134)" mask="url(#d2-4090143152)" /></g><g class="KG4wMiAtJmd0OyBuMDMpWzBd"><path d="M 372.000000 412.000000 L 372.000000 476.000000" stroke="#CBA6f7" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-4090143152-3488378134)" mask="url(#d2-4090143152)" /></g><g class="KG4wMyAtJmd0OyBuMDQpWzBd"><path d="M 372.000000 646.000000 L 372.000000 710.000000" stroke="#CBA6f7" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="ur