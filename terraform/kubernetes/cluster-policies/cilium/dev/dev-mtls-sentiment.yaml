apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: dev-mtls-sentiment
spec:
  description: >-
    Strict role-based access for sentiment workloads in dev namespace.
    Traffic flow (verified via nginx configs and manifests):
      oauth2-proxy (sso) -> sentiment-router (gateway, :8080)
      sentiment-router   -> sentiment-api (backend, :8080)
      sentiment-router   -> sentiment-auth-ui (frontend, :8080)
      sentiment-api      -> llm-gateway (broker, :4000 in LiteLLM mode)
      litellm            -> llama-cpp (:8080)
      sentiment-api      -> otel-collector (observability, :4317/:4318)
    The backend and frontend NEVER receive traffic from platform-gateway
    or sso directly -- only from the router (role=gateway).
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": dev
      "k8s:project": sentiment

  # --- INGRESS ---
  ingress:
    # oauth2-proxy (sso ns) -> sentiment-router (role=gateway) on port 8080
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # sentiment-router (role=gateway) -> sentiment-api (role=backend) :8080
    # sentiment-router (role=gateway) -> sentiment-auth-ui (role=frontend) :8080
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": sentiment
            "k8s:role": gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # sentiment-api (role=backend) -> llm broker (:4000)
    # litellm/llama-cpp (role=llm) internal broker traffic (:8080)
    - fromEndpoints:
        - matchExpressions:
            - key: "k8s:io.kubernetes.pod.namespace"
              operator: In
              values:
                - dev
            - key: "k8s:project"
              operator: In
              values:
                - sentiment
            - key: "k8s:role"
              operator: In
              values:
                - backend
                - llm
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
            - port: "8080"
              protocol: TCP

  # --- EGRESS ---
  egress:
    # sentiment-router -> sentiment-api :8080
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": sentiment
            "k8s:role": backend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # sentiment-router -> sentiment-auth-ui :8080
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": sentiment
            "k8s:role": frontend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # sentiment-api -> otel-collector (observability)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            "k8s:app.kubernetes.io/name": otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
    # sentiment-api -> litellm, litellm -> llama-cpp
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": sentiment
            "k8s:role": llm
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
            - port: "8080"
              protocol: TCP
