apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ccnp-stage-allow-kubernetes-service-443
  annotations:
    "policies.cilium.io/title": "Stage allow kubernetes service 443"
    "platform.publiccloudexperiments.net/source-kind": "CiliumClusterwideNetworkPolicy"
spec:
  description: >-
    Plumbing baseline for application stages. Allows labeled application
    workloads in sandbox, dev, and uat to reach the in-cluster kubernetes
    service on TCP 443.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: In
        values:
          - sandbox
          - dev
          - uat
      - key: "k8s:project"
        operator: Exists
      - key: "k8s:team"
        operator: Exists
      - key: "k8s:app"
        operator: Exists
      - key: "k8s:tier"
        operator: In
        values:
          - gateway
          - frontend
          - backend
      - key: "k8s:app.kubernetes.io/name"
        operator: Exists
  egress:
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
