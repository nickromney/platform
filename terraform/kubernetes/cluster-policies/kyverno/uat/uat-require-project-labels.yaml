apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: uat-require-project-labels
  annotations:
    policies.kyverno.io/title: Require project and role labels in UAT
    policies.kyverno.io/description: >-
      All Deployments in the uat namespace must carry project and role labels
      so that Cilium network policies can enforce project-level isolation.
spec:
  admission: true
  background: true
  validationFailureAction: Audit
  rules:
    - name: require-project-label
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - uat
      validate:
        allowExistingViolations: true
        message: "Deployments in uat must have a 'project' label (sentiment or subnetcalc)."
        pattern:
          metadata:
            labels:
              project: "?*"
    - name: require-role-label
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - uat
      validate:
        allowExistingViolations: true
        message: "Deployments in uat must have a 'role' label (frontend, gateway, backend, or apim)."
        pattern:
          metadata:
            labels:
              role: "?*"
