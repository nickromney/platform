apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: kyverno
    server: https://kubernetes.default.svc
  # Kyverno (like many admission controllers) has webhook caBundles injected/rotated at runtime.
  # Without this, the app can show OutOfSync while being perfectly healthy.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: kyverno-policy-mutating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: kyverno-resource-mutating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: kyverno-verify-mutating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle

    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-cel-exception-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-cleanup-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-exception-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-global-context-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-policy-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-resource-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kyverno-ttl-validating-webhook-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    # The policies.kyverno.io CRDs are normalized/defaulted by the API server and
    # can remain perpetually OutOfSync even when the deployment is healthy.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: deletingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: generatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: imagevalidatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: mutatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespaceddeletingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedgeneratingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedimagevalidatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedmutatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: namespacedvalidatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: policyexceptions.policies.kyverno.io
      jqPathExpressions:
        - .spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: validatingpolicies.policies.kyverno.io
      jqPathExpressions:
        - .spec
    # Ignore CRD defaulting/normalization noise for Kyverno CRDs.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.7.2
    helm:
      releaseName: kyverno
      values: |
        crds:
          install: true
          migration:
            enabled: false
        admissionController:
          replicas: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          forceFailurePolicyIgnore:
            enabled: true
          image:
            registry: dhi.io
            repository: kyverno
            tag: 1.17.2-debian13
          initContainer:
            image:
              registry: dhi.io
              repository: kyverno-init
              tag: 1.17.2-debian13
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
        backgroundController:
          replicas: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          image:
            registry: dhi.io
            repository: kyverno-background-controller
            tag: 1.17.2-debian13
        cleanupController:
          replicas: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          image:
            registry: dhi.io
            repository: kyverno-cleanup-controller
            tag: 1.17.2-debian13
        reportsController:
          replicas: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          image:
            registry: dhi.io
            repository: kyverno-reports-controller
            tag: 1.17.2-debian13
        cleanupJobs:
          admissionReports:
            enabled: false
          clusterAdmissionReports:
            enabled: false
          ephemeralReports:
            enabled: false
          clusterEphemeralReports:
            enabled: false
          updateRequests:
            enabled: false
        webhooksCleanup:
          enabled: false
        policyReportsCleanup:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
