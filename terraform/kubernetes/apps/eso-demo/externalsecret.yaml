apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fake-provider-demo
  namespace: eso-demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: fake-secret-store
    kind: SecretStore
  target:
    name: eso-demo-materialized
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: demo/api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
