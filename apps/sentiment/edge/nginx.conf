server {
  listen 8080;
  server_name _;
  absolute_redirect off;

  # Docker's embedded DNS server. We need runtime DNS re-resolution because
  # container IPs can change on restarts (otherwise nginx caches the first lookup).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location = /.auth/me {
    default_type application/json;
    add_header Cache-Control "no-store";

    set $user_email $http_x_auth_request_email;
    if ($user_email = "") { set $user_email $http_x_forwarded_email; }

    set $user_name $http_x_auth_request_user;
    if ($user_name = "") { set $user_name $user_email; }

    set $access_token_json null;
    if ($http_x_auth_request_access_token != "") { set $access_token_json "\"$http_x_auth_request_access_token\""; }

    set $forwarded_access_token_json null;
    if ($http_x_forwarded_access_token != "") { set $forwarded_access_token_json "\"$http_x_forwarded_access_token\""; }
    if ($access_token_json = null) { set $access_token_json $forwarded_access_token_json; }

    return 200 "[{\"provider_name\":\"oauth2-proxy\",\"user_id\":\"$user_email\",\"access_token\":$access_token_json,\"claims\":[{\"typ\":\"name\",\"val\":\"$user_name\"},{\"typ\":\"email\",\"val\":\"$user_email\"},{\"typ\":\"preferred_username\",\"val\":\"$user_email\"}]}]";
  }

  location ~ ^/\.auth/login/ {
    return 302 http://$host/oauth2/start?rd=/;
  }

  location = /.auth/logout {
    return 302 http://$host/oauth2/sign_out?rd=/signed-out.html;
  }

  # Route API requests through the Go frontend proxy so BACKEND_URL can point at
  # the direct API or an APIM-style gateway without changing browser code.
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    set $api_token $http_x_auth_request_access_token;
    if ($api_token = "") { set $api_token $http_x_forwarded_access_token; }

    set $api_auth "";
    if ($api_token != "") { set $api_auth "Bearer $api_token"; }
    if ($api_auth = "") { set $api_auth $http_authorization; }
    proxy_set_header Authorization $api_auth;

    set $api_upstream "sentiment-auth-frontend:8080";
    proxy_pass http://$api_upstream;
  }

  location = /health {
    return 200 '{"status":"ok","role":"router","service":"sentiment-router"}';
  }

  location = /signed-out.html {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://sentiment-auth-frontend:8080;
  }

  location = /app-shell.css {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://sentiment-auth-frontend:8080;
  }

  location = /favicon.ico {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://sentiment-auth-frontend:8080;
  }

  # Everything else goes to the protected frontend static server
  location / {
    set $auth_email $http_x_auth_request_email;
    if ($auth_email = "") { set $auth_email $http_x_forwarded_email; }
    if ($auth_email = "") { return 302 http://$host/oauth2/start?rd=$uri; }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    set $frontend_upstream "sentiment-auth-frontend:8080";
    proxy_pass http://$frontend_upstream;
  }
}
