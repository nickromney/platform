apiVersion: apps/v1
kind: Deployment
metadata:
  name: subnetcalc-api
spec:
  template:
    spec:
      containers:
        - name: subnetcalc-api-fastapi-container-app
          image: localhost:30090/platform/subnetcalc-api-fastapi-container-app:latest
        - name: subnetcalc-frontend-react
          image: localhost:30090/platform/subnetcalc-frontend-react:latest
        - name: subnetcalc-frontend-typescript-vite
          image: localhost:30090/platform/subnetcalc-frontend-typescript-vite:latest
