apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dev-uat-apps-egress-via-cidrgroup
spec:
  description: >-
    Allow only the real app backends in dev and uat to egress to approved
    CIDRs over HTTPS. Frontends and gateways stay on their explicit
    service-to-service policies.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: In
        values:
          - dev
          - uat
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - sentiment-api
          - subnetcalc-api
      - key: "k8s:project"
        operator: In
        values:
          - kindlocal
      - key: "k8s:team"
        operator: In
        values:
          - dolphin
      - key: "k8s:tier"
        operator: In
        values:
          - backend
  egress:
    - toCIDRSet:
        - cidrGroupRef: approved-egress-cidrs
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
