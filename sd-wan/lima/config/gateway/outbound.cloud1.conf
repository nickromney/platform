# Outbound gateway - Cloud1 (Azure)
# NOTE: In the Lima VM setup, the outbound gateway uses iptables (not nginx).
# This file is kept for reference/Docker Compose compatibility.
# See config/cloud1/iptables-egress.rules for the actual firewall config.
#
# The outbound gateway (10.10.1.254) handles:
# - Egress filtering via iptables
# - SNAT for internal traffic going through WireGuard
# - Routing to remote clouds via WireGuard AllowedIPs
#
# Traffic flow:
#   app1 (10.10.1.4) -> outbound (10.10.1.254) -> wg0 -> cloud2 inbound (172.16.11.2)
