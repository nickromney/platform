apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: gitea-runner-hardened
spec:
  description: >-
    Hardened policy for gitea-runner namespace. Runs CI/CD pipelines.
    Ingress: only from host/remote-node.
    Egress: Gitea (API + SSH + registry), DNS, kube-apiserver,
    and Docker socket (node-level). Base image pulls during docker build
    happen via the host Docker daemon (mounted socket), not pod networking.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": gitea-runner
  ingress:
    - fromEntities:
        - host
        - remote-node
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gitea-runner
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gitea-runner
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gitea
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
            - port: "22"
              protocol: TCP
            - port: "2222"
              protocol: TCP
    - toEntities:
        - host
      toPorts:
        - ports:
            - port: "30090"
              protocol: TCP
