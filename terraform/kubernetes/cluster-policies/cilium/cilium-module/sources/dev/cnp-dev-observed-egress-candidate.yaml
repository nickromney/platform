apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnp-dev-observed-egress-candidate
  namespace: dev
  annotations:
    "policies.cilium.io/title": "Dev observed egress candidate"
    "platform.publiccloudexperiments.net/source-kind": "CiliumNetworkPolicy"
    "platform.publiccloudexperiments.net/hubble-policy-candidate": "true"
    "platform.publiccloudexperiments.net/hubble-policy-direction": "egress"
    "platform.publiccloudexperiments.net/hubble-policy-mode": "workload"
    "platform.publiccloudexperiments.net/hubble-policy-row-count": "9"
    "platform.publiccloudexperiments.net/hubble-policy-since": "5m"
    "platform.publiccloudexperiments.net/hubble-policy-iterations": "3"
    "platform.publiccloudexperiments.net/hubble-policy-capture-mode": "flows"
specs:
  - description: >-
      Observed egress traffic from dev/sentiment-api
    endpointSelector:
      matchLabels:
        "k8s:io.kubernetes.pod.namespace": "dev"
        "k8s:app.kubernetes.io/name": "sentiment-api"
    egress:
      - toEndpoints:
          - matchLabels:
              "k8s:io.kubernetes.pod.namespace": "observability"
              "k8s:app.kubernetes.io/name": "otel-collector"
        toPorts:
          - ports:
              - port: "4318"
                protocol: TCP
  - description: >-
      Observed egress traffic from dev/sentiment-router
    endpointSelector:
      matchLabels:
        "k8s:io.kubernetes.pod.namespace": "dev"
        "k8s:app.kubernetes.io/name": "sentiment-router"
    egress:
      - toEndpoints:
          - matchLabels:
              "k8s:io.kubernetes.pod.namespace": "dev"
              "k8s:app.kubernetes.io/name": "sentiment-auth-ui"
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
  - description: >-
      Observed egress traffic from dev/subnetcalc-api
    endpointSelector:
      matchLabels:
        "k8s:io.kubernetes.pod.namespace": "dev"
        "k8s:app.kubernetes.io/name": "subnetcalc-api"
    egress:
      - toEndpoints:
          - matchLabels:
              "k8s:io.kubernetes.pod.namespace": "observability"
              "k8s:app.kubernetes.io/name": "otel-collector"
        toPorts:
          - ports:
              - port: "4318"
                protocol: TCP
