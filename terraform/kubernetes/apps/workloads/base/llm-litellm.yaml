apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
data:
  config.yaml: |
    model_list:
      - model_name: sentiment-default
        litellm_params:
          model: os.environ/LITELLM_UPSTREAM_MODEL
          api_base: os.environ/LITELLM_UPSTREAM_API_BASE
          api_key: os.environ/LITELLM_UPSTREAM_API_KEY

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-cpp-cache
  labels:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-cpp
      app.kubernetes.io/component: llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-cpp
        app.kubernetes.io/component: llm
        app: sentiment-llm
        project: kindlocal
        team: dolphin
        tier: backend
        role: llm
    spec:
      containers:
        - name: llama-cpp
          image: __LLAMA_CPP_IMAGE__
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: LLAMA_CACHE
              value: "/models-cache"
            - name: LLAMA_ARG_HOST
              value: "0.0.0.0"
            - name: LLAMA_ARG_PORT
              value: "8080"
            - name: LLAMA_ARG_ALIAS
              value: "__LLAMA_CPP_MODEL_ALIAS__"
            - name: LLAMA_ARG_CTX_SIZE
              value: "__LLAMA_CPP_CTX_SIZE__"
            - name: LLAMA_ARG_HF_REPO
              value: "__LLAMA_CPP_HF_REPO__"
            - name: LLAMA_ARG_HF_FILE
              value: "__LLAMA_CPP_HF_FILE__"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: llama-cpp-cache
              mountPath: /models-cache
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: llama-cpp-cache
          persistentVolumeClaim:
            claimName: llama-cpp-cache

---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
spec:
  selector:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/component: llm
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/component: llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/component: llm
        app: sentiment-llm
        project: kindlocal
        team: dolphin
        tier: backend
        role: llm
    spec:
      containers:
        - name: litellm
          image: dhi.io/litellm:1.81.12-debian13
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          env:
            - name: LITELLM_UPSTREAM_MODEL
              value: "__LITELLM_UPSTREAM_MODEL__"
            - name: LITELLM_UPSTREAM_API_BASE
              value: "__LITELLM_UPSTREAM_API_BASE__"
            - name: LITELLM_UPSTREAM_API_KEY
              value: "__LITELLM_UPSTREAM_API_KEY__"
          ports:
            - name: http
              containerPort: 4000
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  labels:
    app.kubernetes.io/name: llm-gateway
    app.kubernetes.io/component: llm
    app: sentiment-llm
    project: kindlocal
    team: dolphin
    tier: backend
    role: llm
spec:
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: llm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
