                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 6}, "id": 101, "options": {"content": "## Policy Drops (Agent Metrics)\nPackets dropped by the Cilium datapath. \"Policy denied\" means a pod tried to send/receive traffic not allowed by any Cilium policy.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "palette-classic"}}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}, "id": 10, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["sum"]}}, "targets": [{"expr": "sum(increase(cilium_drop_count_total[5m])) by (direction, reason)", "legendFormat": "{{direction}} — {{reason}}", "refId": "A"}], "title": "Drops by Direction & Reason (5m buckets)", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}, "id": 11, "options": {"pieType": "donut", "legend": {"displayMode": "table", "placement": "right", "calcs": ["value"]}, "reduceOptions": {"calcs": ["lastNotNull"]}}, "targets": [{"expr": "sum(cilium_drop_count_total) by (reason)", "legendFormat": "{{reason}}", "refId": "A"}], "title": "Cumulative Drops by Reason", "type": "piechart"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 16}, "id": 102, "options": {"content": "## Hubble Flow Metrics\nPer-flow metrics from Hubble (requires `hubble.metrics.enabled` in Cilium config). Shows traffic verdicts, HTTP request rates, and cross-namespace flows.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
