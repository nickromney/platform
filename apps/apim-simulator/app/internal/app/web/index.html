<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APIM Simulator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/app-shell.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
      <div>
        <h1>APIM Simulator</h1>
        <p>Go gateway, vanilla console, APIM-shaped routing and tracing.</p>
      </div>
      <div class="header-actions">
        <p id="auth-state" class="auth-state">Not signed in.</p>
        <button id="logout-btn" class="sign-in-link" type="button">Sign Out</button>
        <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system">
          <svg data-theme-icon="system" aria-hidden="true" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="12" rx="2"></rect><path d="M8 20h8"></path><path d="M12 16v4"></path></svg>
          <svg data-theme-icon="light" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
          <svg data-theme-icon="dark" aria-hidden="true" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5z"></path></svg>
        </button>
      </div>
    </header>
    <main id="main" tabindex="-1">
      <section id="status" class="notice">Connect to load the gateway surface.</section>
      <form id="connection-form">
        <label for="tenant-key">Tenant Key</label>
        <div class="form-row">
          <input id="tenant-key" type="password" value="local-dev-tenant-key">
          <button type="submit">Connect</button>
        </div>
      </form>
      <section class="metrics">
        <article><strong id="metric-apis">0</strong><span>APIs</span></article>
        <article><strong id="metric-routes">0</strong><span>Routes</span></article>
        <article><strong id="metric-products">0</strong><span>Products</span></article>
        <article><strong id="metric-subscriptions">0</strong><span>Subscriptions</span></article>
      </section>
      <section class="grid">
        <div>
          <h2>Routes</h2>
          <ul id="routes"></ul>
        </div>
        <div>
          <h2>Subscriptions</h2>
          <ul id="subscriptions"></ul>
        </div>
      </section>
      <section>
        <h2>Replay</h2>
        <form id="replay-form" class="replay">
          <select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
          <input id="path" value="/api/health">
          <textarea id="headers">{ "x-apim-trace": "true" }</textarea>
          <textarea id="body" placeholder="Body"></textarea>
          <button type="submit">Run</button>
        </form>
        <pre id="replay-result"></pre>
      </section>
      <section>
        <h2>Traces</h2>
        <button id="refresh-traces" type="button">Refresh traces</button>
        <pre id="traces"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
