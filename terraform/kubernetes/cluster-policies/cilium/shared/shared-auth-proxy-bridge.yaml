apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: shared-auth-proxy-bridge
spec:
  description: >-
    Reusable bridge policy for oauth2-proxy style workloads running in
    namespace-role=shared. Shared ingress comes from the platform gateway data
    plane on :4180 and Prometheus scrapes metrics on :44180. Egress to
    namespace-role=application gateways stays workload-based instead of
    hard-coding the current app namespace list.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - shared
      - key: "k8s:app.kubernetes.io/component"
        operator: In
        values:
          - authentication-proxy
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": platform-gateway-nginx
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": prometheus
      toPorts:
        - ports:
            - port: "44180"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
            "k8s:tier": gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
