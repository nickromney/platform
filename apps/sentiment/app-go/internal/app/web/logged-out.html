<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signed Out - Sentiment</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/runtime-config.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 0;
    }

    section {
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    a[role="button"] {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Signed out</h1>
      <p>Your sentiment session has ended.</p>
      <div class="actions">
        <a id="login-link" href="/.auth/login/sso" role="button">Sign in again</a>
      </div>
    </section>
  </main>
  <script>
    const config = window.SENTIMENT_RUNTIME_CONFIG || {};
    if (config.authMethod !== "gateway" && config.apiAuthMethod !== "gateway") {
      document.getElementById("login-link").href = "/";
    }
  </script>
</body>
</html>
