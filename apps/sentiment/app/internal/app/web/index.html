<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sentiment (Authenticated)</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/app-shell.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Sentiment</h1>
          <p>Classify comments with a minimal vanilla UI and Go API.</p>
        </div>
        <div class="header-actions">
          <p id="auth-state" class="auth-state">Not signed in.</p>
          <button id="logout-btn" type="button" hidden>Sign Out</button>
          <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system">
            <svg data-theme-icon="system" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="12" rx="2"></rect>
              <path d="M8 20h8"></path>
              <path d="M12 16v4"></path>
            </svg>
            <svg data-theme-icon="light" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg data-theme-icon="dark" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 14.5A8 8 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5z"></path>
            </svg>
          </button>
        </div>
      </header>
      <section id="api-status" class="notice">Checking API...</section>
      <section>
        <p id="status">Loading comments...</p>
        <form id="comment-form">
          <label for="comment-text">Comment</label>
          <textarea id="comment-text" rows="5" placeholder="Write a short comment"></textarea>
          <div class="comment-actions">
            <div class="samples" aria-label="Sample comments">
              <button type="button" data-sample="positive">Positive sample</button>
              <button type="button" data-sample="mixed">Mixed sample</button>
              <button type="button" data-sample="negative">Negative sample</button>
            </div>
            <button class="analyse-action" type="submit" data-action="analyze">Analyse</button>
          </div>
        </form>
      </section>
      <section>
        <h2>Recent Comments</h2>
        <div id="comments"></div>
        <div id="diagnostics" class="diagnostics" aria-live="polite"></div>
      </section>
    </main>
    <script src="/runtime-config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
