            cilium-security:
              json: |
                {
                  "annotations": {"list": []},
                  "description": "Cilium policy enforcement and Hubble flow metrics. Shows policy verdicts, drops by reason, cross-namespace traffic, and HTTP request breakdowns. Requires hubble.metrics to be enabled in Cilium Helm values.",
                  "editable": true,
                  "graphTooltip": 1,
                  "panels": [
                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 0}, "id": 100, "options": {"content": "## Policy Enforcement Status\nCilium agent metrics showing endpoint enforcement state and policy counts.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 0, "y": 2}, "id": 1, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"both\"})", "refId": "A"}], "title": "Ingress+Egress Enforced", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 4, "y": 2}, "id": 2, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"egress\"})", "refId": "A"}], "title": "Egress-Only Enforced", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "yellow", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 8, "y": 2}, "id": 3, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"none\"})", "refId": "A"}], "title": "No Policy (open)", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 4, "w": 4, "x": 12, "y": 2}, "id": 4, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_feature_network_policies_cilium_clusterwide_network_policies_total)", "refId": "A"}], "title": "Clusterwide Policies", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 4, "w": 4, "x": 16, "y": 2}, "id": 5, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_feature_network_policies_deny_policies_total)", "refId": "A"}], "title": "Deny Policies", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 4, "w": 4, "x": 20, "y": 2}, "id": 6, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_feature_network_policies_http_policies_total)", "refId": "A"}], "title": "L7 HTTP Policies", "type": "stat"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 6}, "id": 101, "options": {"content": "## Policy Drops (Agent Metrics)\nPackets dropped by the Cilium datapath. \"Policy denied\" means a pod tried to send/receive traffic not allowed by any Cilium policy.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "palette-classic"}}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}, "id": 10, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["sum"]}}, "targets": [{"expr": "sum(increase(cilium_drop_count_total[5m])) by (direction, reason)", "legendFormat": "{{direction}} — {{reason}}", "refId": "A"}], "title": "Drops by Direction & Reason (5m buckets)", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}, "id": 11, "options": {"pieType": "donut", "legend": {"displayMode": "table", "placement": "right", "calcs": ["value"]}, "reduceOptions": {"calcs": ["lastNotNull"]}}, "targets": [{"expr": "sum(cilium_drop_count_total) by (reason)", "legendFormat": "{{reason}}", "refId": "A"}], "title": "Cumulative Drops by Reason", "type": "piechart"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 16}, "id": 102, "options": {"content": "## Hubble Flow Metrics\nPer-flow metrics from Hubble (requires `hubble.metrics.enabled` in Cilium config). Shows traffic verdicts, HTTP request rates, and cross-namespace flows.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "pps"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18}, "id": 20, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"]}}, "targets": [{"expr": "sum(rate(hubble_drop_total[5m])) by (reason)", "legendFormat": "{{reason}}", "refId": "A"}], "title": "Hubble Drops by Reason (rate)", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "pps"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18}, "id": 21, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"]}}, "targets": [{"expr": "sum(rate(hubble_flows_processed_total[5m])) by (verdict)", "legendFormat": "{{verdict}}", "refId": "A"}], "title": "Hubble Flow Verdicts (rate)", "type": "timeseries"},

                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 26}, "id": 30, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_http_requests_total{destination_namespace=~\"dev|uat|apim\"}[5m])) by (source_workload, destination_workload, method)", "legendFormat": "{{source_workload}}→{{destination_workload}} {{method}}", "refId": "A"}], "title": "HTTP Requests: App Namespaces (source→dest)", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 26}, "id": 31, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_http_requests_total{destination_namespace=~\"dev|uat|apim\"}[5m])) by (source_namespace, destination_namespace, status)", "legendFormat": "{{source_namespace}}→{{destination_namespace}} ({{status}})", "refId": "A"}], "title": "HTTP Requests: Cross-Namespace (status)", "type": "timeseries"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 34}, "id": 103, "options": {"content": "## TCP & DNS Metrics\nTCP connection tracking and DNS query rates from Hubble.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 36}, "id": 40, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_tcp_flags_total[5m])) by (flag, family)", "legendFormat": "{{flag}} ({{family}})", "refId": "A"}], "title": "TCP Flags Rate", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 36}, "id": 41, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_dns_queries_total[5m])) by (rcode)", "legendFormat": "rcode={{rcode}}", "refId": "A"}], "title": "DNS Query Rate by Response Code", "type": "timeseries"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 44}, "id": 104, "options": {"content": "## Policy Verdict Breakdown\nHubble policy verdict metrics showing allowed vs denied traffic per namespace.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "pps"}}, "gridPos": {"h": 8, "w": 24, "x": 0, "y": 46}, "id": 50, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"]}}, "targets": [{"expr": "sum(rate(hubble_policy_verdicts_total[5m])) by (verdict, direction)", "legendFormat": "{{verdict}} ({{direction}})", "refId": "A"}], "title": "Policy Verdicts: Allowed vs Denied", "type": "timeseries"}
                  ],
                  "refresh": "30s",
                  "schemaVersion": 39,
                  "tags": ["cilium", "security", "hubble", "policy"],
                  "templating": {"list": [{"name": "prometheus", "type": "datasource", "query": "prometheus", "current": {"selected": false, "value": "Prometheus"}}]},
                  "time": {"from": "now-1h", "to": "now"},
