apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: metrics-server-hardened
spec:
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": metrics-server
      "k8s:app.kubernetes.io/name": metrics-server
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
