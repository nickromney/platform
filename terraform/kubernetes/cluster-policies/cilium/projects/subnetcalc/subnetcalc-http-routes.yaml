apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-router-http-routes
spec:
  description: >-
    The router sends browser API traffic through the shared APIM simulator.
    Dev frontend paths re-enter the platform gateway so Argo Rollouts can shift
    Gateway API backend weights; UAT keeps the direct frontend path.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": subnetcalc-router
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health.*"
              - method: "POST"
                path: "/api/v1/ipv4/.*"
              - method: "OPTIONS"
                path: "/api/v1/ipv4/.*"
              - method: "GET"
                path: "/api/v1/subnet.*"
              - method: "POST"
                path: "/api/v1/subnet.*"
              - method: "OPTIONS"
                path: "/api/v1/subnet.*"
    - toEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": frontend
            "k8s:app.kubernetes.io/name": subnetcalc-frontend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": platform-gateway
            "k8s:app.kubernetes.io/name": platform-gateway-nginx
            "k8s:gateway.networking.k8s.io/gateway-name": platform-gateway
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-api-http-routes
spec:
  description: >-
    The subnetcalc API receives browser traffic only from the shared APIM simulator.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": backend
      "k8s:app.kubernetes.io/name": subnetcalc-api
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health.*"
              - method: "POST"
                path: "/api/v1/ipv4/.*"
              - method: "OPTIONS"
                path: "/api/v1/ipv4/.*"
              - method: "GET"
                path: "/api/v1/subnet.*"
              - method: "POST"
                path: "/api/v1/subnet.*"
              - method: "OPTIONS"
                path: "/api/v1/subnet.*"
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": keycloak
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            "k8s:app.kubernetes.io/name": otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
