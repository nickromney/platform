# TLS 1.3 experiment overlay for subnet-calculator (Mozilla Modern profile)
#
# Demonstrates TLS 1.3 for stack-01 (html-static frontend + container-app API).
# Adapt the tls-proxy upstream in tls-proxy/nginx.conf for other stacks.
#
# Usage:
#   cd pki && ./gen-certs.sh       # one-time: generate local dev certs
#   docker compose -f compose.yml -f compose.tls.yml up \
#     tls-proxy frontend-html-static api-fastapi-container-app
#
# Access:
#   https://localhost:8443  — TLS 1.3 (Mozilla Modern), static frontend + API
#   http://localhost:8444   — redirects to HTTPS
#
# Architecture:
#   Browser → tls-proxy:8443 (TLS 1.3) → frontend-html-static:8081
#                                               └── /api/ → api-fastapi-container-app:8000
#
# The existing HTTP-only stacks (compose.yml alone) are unchanged.
services:
  tls-proxy:
    image: dhi.io/nginx:1.29.5-debian13
    ports:
      - "8443:8443"
      - "8444:8080"
    volumes:
      - ./tls-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pki/server-fullchain.crt:/etc/nginx/certs/server-fullchain.crt:ro
      - ./pki/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      frontend-html-static:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:8443/ 2>/dev/null || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
