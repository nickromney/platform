<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sentiment (Authenticated)</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/app-shell.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
      <div>
        <h1>Sentiment</h1>
        <p>Classify comments with a minimal vanilla UI and Go API.</p>
      </div>
      <div class="header-actions">
        <p id="auth-state" class="auth-state">Not signed in.</p>
        <button id="logout-btn" class="sign-in-link" type="button" hidden>Sign Out</button>
        <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system"></button>
      </div>
    </header>
    <main id="main" tabindex="-1">
      <section id="api-status" class="app-panel notice" role="status" aria-live="polite">Checking API...</section>
      <section id="compose" class="app-panel" aria-labelledby="compose-title">
        <h2 id="compose-title">New Comment</h2>
        <p id="status" role="status" aria-live="polite">Loading comments...</p>
        <form id="comment-form">
          <label for="comment-text">Comment</label>
          <textarea id="comment-text" name="comment" rows="5" placeholder="Write a short comment" required></textarea>
          <div class="comment-actions">
            <div class="samples" aria-label="Sample comments">
              <button type="button" data-sample="positive">Positive sample</button>
              <button type="button" data-sample="mixed">Mixed sample</button>
              <button type="button" data-sample="negative">Negative sample</button>
            </div>
            <button class="analyse-action" type="submit" data-action="analyze">Analyze</button>
          </div>
        </form>
      </section>
      <section id="recent-comments" class="app-panel" aria-labelledby="recent-comments-title">
        <h2 id="recent-comments-title">Recent Comments</h2>
        <div id="comments" aria-live="polite"></div>
        <div id="diagnostics" class="diagnostics" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="/runtime-config.js"></script>
    <script src="/idpauth.js"></script>
    <script src="/app-shell.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
