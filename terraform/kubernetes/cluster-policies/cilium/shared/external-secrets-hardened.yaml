apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: external-secrets-hardened
spec:
  description: >-
    Hardened policy for the External Secrets Operator namespace.
    ESO reconciles SecretStore and ExternalSecret resources into Kubernetes
    Secrets. The fake provider demo keeps provider traffic in-process.
    Ingress: kube-apiserver into the validating webhook, plus intra-namespace
    traffic. Egress: DNS, kube-apiserver, and intra-namespace traffic.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": external-secrets
      "k8s:app.kubernetes.io/instance": external-secrets
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": external-secrets
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": external-secrets
