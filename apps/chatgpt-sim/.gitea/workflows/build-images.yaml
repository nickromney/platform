name: Build chatgpt-sim image

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "shared/**"
      - ".gitea/workflows/**"
  workflow_dispatch:

env:
  WORKDIR: /tmp/chatgpt-sim
  APP_REPO_NAME: chatgpt-sim

jobs:
  build:
    runs-on: [self-hosted, in-cluster]
    defaults:
      run:
        shell: sh
    steps:
      - name: Clone repo
        run: |
          set -e
          : "${GITEA_HTTP_BASE:?}"
          : "${GITEA_REPO_OWNER:?}"
          : "${REGISTRY_USERNAME:?}"
          : "${REGISTRY_PWD:?}"
          rm -rf "${WORKDIR}"
          git clone "${GITEA_HTTP_BASE}/${GITEA_REPO_OWNER}/${APP_REPO_NAME}.git" "${WORKDIR}"
          cd "${WORKDIR}" && git checkout main

      - name: Log in to registry
        run: |
          set -e
          : "${REGISTRY_HOST:?}"
          echo "${REGISTRY_PWD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build and push runtime image
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          cat > Dockerfile.runtime <<'EOF_DOCKERFILE'
          FROM dhi.io/golang:1.26-alpine3.23-dev AS build
          WORKDIR /src
          COPY app/go.mod app/go.sum ./
          COPY shared /shared
          RUN go mod download
          COPY app/ ./
          RUN CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /out/chatgpt-sim ./cmd/chatgpt-sim

          FROM dhi.io/static:20260413-alpine3.23
          COPY --from=build /out/chatgpt-sim /chatgpt-sim
          USER 65532:65532
          ENV PORT=8080
          EXPOSE 8080
          ENTRYPOINT ["/chatgpt-sim"]
          EOF_DOCKERFILE

          docker build --provenance=false -f Dockerfile.runtime -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/chatgpt-sim:${TAG}" .
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/chatgpt-sim:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/chatgpt-sim:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/chatgpt-sim:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/chatgpt-sim:latest"
