apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: chatgpt-sim-hardened
spec:
  description: >-
    Hardened policy for the ChatGPT simulator. oauth2-proxy is the only
    permitted ingress source, MCP discovery/tool calls must go via APIM, and
    LLM chat completions must go via agentgateway.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": dev
      "k8s:app.kubernetes.io/name": chatgpt-sim
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
            "k8s:app.kubernetes.io/name": oauth2-proxy
            "k8s:app.kubernetes.io/instance": oauth2-proxy-chatgpt-sim
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": agentgateway-system
            "k8s:app.kubernetes.io/name": agentgateway-ai-gateway
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
