apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-cloud-metadata-dev-uat-apps
spec:
  description: Deny cloud metadata egress for real app pods in dev and uat.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: In
        values:
          - dev
          - uat
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - sentiment-api
          - sentiment-auth-ui
          - sentiment-router
          - subnetcalc-api
          - subnetcalc-frontend
          - subnetcalc-router
  egressDeny:
    - toCIDRSet:
        - cidr: 169.254.169.254/32
