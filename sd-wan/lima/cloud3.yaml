# Lima VM: cloud3 (AWS)
# Internal: 172.31.1.0/24 (AWS VPC default range, different from cloud1/2)
# External: 172.16.12.0/24
# SD-WAN tunnel: 192.168.1.3
# Also has 10.10.1.0/24 for gateway layer (overlaps with cloud1/2)

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

vmType: "vz"
rosetta:
  enabled: true

cpus: 1
memory: "512MiB"
disk: "8GiB"

networks:
  - lima: user-v2

portForwards:
  # Ignore Lima's fallback auto-forwarding so we only claim the explicit ports above.
  - guestIP: 0.0.0.0
    guestIPMustBeZero: false
    guestPortRange: [1, 65535]
    proto: any
    ignore: true

mounts:
  - location: "~"
    writable: false
  - location: "/tmp/lima"
    writable: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive

      PROJECT_DIR=""
      for base in /Users /home; do
        found=$(find "$base" -maxdepth 6 -path '*/sd-wan/lima' -type d 2>/dev/null | head -1)
        if [ -n "$found" ]; then
          PROJECT_DIR="$found"
          break
        fi
      done
      if [ -z "$PROJECT_DIR" ]; then
        echo "ERROR: Could not find sd-wan/lima project directory"
        exit 1
      fi

      export CLOUD_NUM=3
      export CLOUD_NAME=cloud3
      export CLOUD_ROLE=aws
      export INTERNAL_IP=172.31.1.1
      export DNS_IP=172.31.1.10
      export INBOUND_IP=10.10.1.60
      export OUTBOUND_IP=10.10.1.254
      export EXTERNAL_VIP=172.16.12.3
      export EXTERNAL_SUBNET=172.16.12.0/24
      export TUNNEL_IP=192.168.1.3
      export APP_SERVICE=app2
      export PROJECT_DIR

      bash "$PROJECT_DIR/provision/common.sh"
      bash "$PROJECT_DIR/provision/cloud3.sh"
