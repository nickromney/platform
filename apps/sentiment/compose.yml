# Compose configuration for sentiment (local equivalent of kind-local demo)
# Works with both docker compose and podman-compose.
#
# The local stack uses the same SST-backed sentiment path as the Kubernetes demo.

x-app-runtime-hardening: &app-runtime-hardening
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,mode=1777

x-nginx-runtime-hardening: &nginx-runtime-hardening
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,uid=65532,gid=65532,mode=1777
    - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532
    - /var/run/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    entrypoint: ["/bin/sh", "/opt/keycloak/local/start-with-templated-realm.sh"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-demo@admin.test}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - KC_DB=dev-file
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - OAUTH2_PROXY_CLIENT_SECRET=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - KEYCLOAK_DEMO_PASSWORD=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
    ports:
      - "8300:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/local/realm-export.template.json:ro
      - ./keycloak/start-with-templated-realm.sh:/opt/keycloak/local/start-with-templated-realm.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      # Keycloak startup can be substantially slower on cold linux/amd64 boots under emulation.
      retries: 30
      start_period: 600s

  sentiment-api:
    <<: *app-runtime-hardening
    build:
      context: ./api-sentiment
      dockerfile: Dockerfile
      args:
        SENTIMENT_MODEL_ID: ${SENTIMENT_MODEL_ID:-}
    environment:
      - HOME=/tmp
      - SENTIMENT_MODEL_ID
      - SENTIMENT_MODEL_CACHE_DIR=/opt/transformers-cache
      - SENTIMENT_MODEL_LOCAL_ONLY=1
      - SENTIMENT_NEUTRAL_MARGIN=${SENTIMENT_NEUTRAL_MARGIN:-0.45}
      - DATA_DIR=/data
      - CSV_PATH=/data/comments.csv
    volumes:
      - ./data:/data

  sentiment-auth-frontend:
    <<: *nginx-runtime-hardening
    build:
      context: ./frontend-react-vite/sentiment-auth-ui
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_BASE_URL: http://localhost:8300
    expose:
      - "8080"

  edge:
    <<: *nginx-runtime-hardening
    image: dhi.io/nginx:1.29.5-debian13
    user: "65532:65532"
    volumes:
      - ./edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    depends_on:
      - sentiment-api
      - sentiment-auth-frontend

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
    restart: unless-stopped
    ports:
      - "8304:4180"
    environment:
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:-00000000000000000000000000000000}
    command:
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=http://localhost:8300/realms/sentiment
      - --login-url=http://localhost:8300/realms/sentiment/protocol/openid-connect/auth?max_age=0
      - --redeem-url=http://keycloak:8080/realms/sentiment/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/sentiment/protocol/openid-connect/certs
      - --validate-url=http://keycloak:8080/realms/sentiment/protocol/openid-connect/userinfo
      - --client-id=oauth2-proxy
      - --client-secret=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - --redirect-url=http://localhost:8304/oauth2/callback
      - --code-challenge-method=S256
      - --upstream=http://edge:8080
      - --http-address=0.0.0.0:4180
      - --cookie-secure=false
      - --cookie-httponly=true
      - --cookie-expire=4h
      - --cookie-refresh=1h
      - --email-domain=*
      - --scope=openid
      - --prompt=login
      - --standard-logging=true
      - --auth-logging=true
      - --request-logging=true
      - --upstream-timeout=180s
    depends_on:
      - keycloak
      - edge
