                  "editable": true,
                  "graphTooltip": 1,
                  "panels": [
                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 0}, "id": 100, "options": {"content": "## Policy Enforcement Status\nCilium agent metrics showing endpoint enforcement state and policy counts.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 0, "y": 2}, "id": 1, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"both\"})", "refId": "A"}], "title": "Ingress+Egress Enforced", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 4, "y": 2}, "id": 2, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"egress\"})", "refId": "A"}], "title": "Egress-Only Enforced", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "yellow", "value": 0}]}}}, "gridPos": {"h": 4, "w": 4, "x": 8, "y": 2}, "id": 3, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_policy_endpoint_enforcement_status{enforcement=\"none\"})", "refId": "A"}], "title": "No Policy (open)", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 4, "w": 4, "x": 12, "y": 2}, "id": 4, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_feature_network_policies_cilium_clusterwide_network_policies_total)", "refId": "A"}], "title": "Clusterwide Policies", "type": "stat"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 4, "w": 4, "x": 16, "y": 2}, "id": 5, "options": {"colorMode": "value", "graphMode": "none"}, "targets": [{"expr": "sum(cilium_feature_network_policies_deny_policies_total)", "refId": "A"}], "title": "Deny Policies", "type": "stat"},
