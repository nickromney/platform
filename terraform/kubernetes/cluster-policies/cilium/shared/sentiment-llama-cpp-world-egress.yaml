apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-sentiment-llama-cpp-world-egress
spec:
  description: |
    Allow llama.cpp pods in dev and uat to pull GGUF model artifacts over HTTP(S).
    This is only needed for the in-cluster LiteLLM broker path.
  endpointSelector:
    matchExpressions:
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - llama-cpp
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - application
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
