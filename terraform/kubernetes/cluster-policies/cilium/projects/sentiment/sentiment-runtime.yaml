apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sentiment-router-ingress
spec:
  description: >-
    Allow only SSO reverse-proxies to reach the sentiment router.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment-llm
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": sentiment-router
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sentiment-backend-ingress
spec:
  description: >-
    Allow only the sentiment router to reach the sentiment API.
  endpointSelector:
    matchLabels:
