apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: platform-gateway-hardened
spec:
  description: >-
    Hardened policy for platform-gateway namespace. This is the TLS termination
    point (NGINX Gateway Fabric). All external traffic enters here.
    Ingress: external clients via host/remote-node on :443 only.
    Egress: shared auth proxies on :4180, shared Dex on :5556, headlamp on
    :4466, policy-reporter UI on :8080, DNS, kube-apiserver, and the
    nginx-gateway control-plane.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": platform-gateway
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": platform-gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": argocd
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": headlamp
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": platform-gateway
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/component": authentication-proxy
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": dex
      toPorts:
        - ports:
            # Dex OIDC endpoints proxied via httproute-dex.yaml
            - port: "5556"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": headlamp
      toPorts:
        - ports:
            - port: "4466"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": policy-reporter
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": nginx-gateway
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "8443"
              protocol: TCP
