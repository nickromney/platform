apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: apim-baseline
spec:
  description: >-
    Hardened policy for apim namespace (shared APIM simulator).
    Traffic flow (verified via APIM config.json):
      Ingress: subnetcalc-router (dev/uat, tier=gateway) -> :8000
      Egress:  -> subnetcalc-api (dev/uat, tier=backend) :8000  (host-header routed)
      Egress:  -> keycloak (sso) :8080  (JWKS fetch for JWT validation)
      Egress:  -> DNS, kube-apiserver
    Any namespace labeled namespace-role=application can inherit the same
    subnetcalc flow without duplicating this policy. A namespace-local override
    should live with that namespace overlay rather than inside this shared
    baseline.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": apim
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
  ingress:
    # Kubelet health probes
    - fromEntities:
        - host
        - remote-node
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-router
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # apim-simulator -> keycloak (JWKS fetch for JWT validation)
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": keycloak
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": backend
            "k8s:app.kubernetes.io/name": subnetcalc-api
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # kube-apiserver
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
