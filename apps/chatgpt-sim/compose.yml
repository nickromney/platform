services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    profiles: ["sso"]
    entrypoint: ["/bin/sh", "/opt/keycloak/local/start-with-templated-realm.sh"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-demo@admin.test}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      OAUTH2_PROXY_CLIENT_SECRET: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      KEYCLOAK_DEMO_PASSWORD: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
    ports:
      - "${CHATGPT_SIM_KEYCLOAK_PORT:-8500}:8080"
    volumes:
      - ../shared/keycloak/realm-export.json:/opt/keycloak/local/realm-export.template.json:ro
      - ../shared/keycloak/start-with-templated-realm.sh:/opt/keycloak/local/start-with-templated-realm.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 600s

  chatgpt-sim:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      ROLE: shell
      PORT: "8080"
      PUBLIC_BASE_URL: http://localhost:${CHATGPT_SIM_PUBLIC_PORT:-18084}
      MCP_URL: http://mcp-server:8080/mcp
      LLM_URL: ${CHATGPT_SIM_LLM_URL:-http://llm:8080/v1/chat/completions}
      LLM_MODEL: ${CHATGPT_SIM_LLM_MODEL:-${PLATFORM_LLM_MODEL:-go-local-openai-compatible-stub}}
      LLM_TIMEOUT_SECONDS: ${CHATGPT_SIM_LLM_TIMEOUT_SECONDS:-1}
      LLM_MAX_TOKENS: ${CHATGPT_SIM_LLM_MAX_TOKENS:-32}
      LANGFUSE_HOST: ${CHATGPT_SIM_LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${CHATGPT_SIM_LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${CHATGPT_SIM_LANGFUSE_SECRET_KEY:-}
      LANGFUSE_TIMEOUT_SECONDS: ${CHATGPT_SIM_LANGFUSE_TIMEOUT_SECONDS:-1}
      HOME: /tmp
    ports:
      - "${CHATGPT_SIM_APP_PORT:-18084}:8080"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    depends_on:
      mcp-server:
        condition: service_healthy
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/chatgpt-sim", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
    profiles: ["sso"]
    restart: unless-stopped
    ports:
      - "${CHATGPT_SIM_PUBLIC_PORT:-18084}:4180"
    environment:
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
    command:
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=http://localhost:${CHATGPT_SIM_KEYCLOAK_PORT:-8500}/realms/platform
      - --login-url=http://localhost:${CHATGPT_SIM_KEYCLOAK_PORT:-8500}/realms/platform/protocol/openid-connect/auth?max_age=0
      - --redeem-url=http://keycloak:8080/realms/platform/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/platform/protocol/openid-connect/certs
      - --validate-url=http://keycloak:8080/realms/platform/protocol/openid-connect/userinfo
      - --client-id=oauth2-proxy
      - --client-secret=${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      - --redirect-url=http://localhost:${CHATGPT_SIM_PUBLIC_PORT:-18084}/oauth2/callback
      - --code-challenge-method=S256
      - --upstream=http://chatgpt-sim:8080
      - --http-address=0.0.0.0:4180
      - --cookie-secure=false
      - --cookie-httponly=true
      - --cookie-expire=4h
      - --cookie-refresh=1h
      - --email-domain=*
      - --scope=openid email profile
      - --oidc-groups-claim=groups
      - --allowed-group=platform-viewers
      - --allowed-group=platform-admins
      - --pass-access-token=true
      - --pass-user-headers=true
      - --set-authorization-header=true
      - --set-xauthrequest=true
      - --standard-logging=true
      - --auth-logging=true
      - --request-logging=true
      - --upstream-timeout=180s
      - --skip-auth-regex=^/(signed-out\.html|style\.css|app-shell\.css|favicon\.svg|favicon\.ico)$
      - --reverse-proxy=true
      - --skip-provider-button=true
    depends_on:
      - keycloak
      - chatgpt-sim

  mcp-server:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      ROLE: mcp
      PORT: "8080"
      PUBLIC_BASE_URL: http://mcp-server:8080
      HOME: /tmp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    healthcheck:
      test: ["CMD", "/chatgpt-sim", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  llm:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      ROLE: llm
      PORT: "8080"
      LLM_MODEL: ${PLATFORM_LLM_MODEL:-go-local-openai-compatible-stub}
      HOME: /tmp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    healthcheck:
      test: ["CMD", "/chatgpt-sim", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s
