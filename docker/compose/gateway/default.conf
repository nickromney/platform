resolver 127.0.0.11 ipv6=off valid=30s;

server {
  listen 80 default_server;
  server_name _;

  location = /health {
    return 200 "ok\n";
  }

  return 404;
}

server {
  listen 80;
  server_name dex.compose.127.0.0.1.sslip.io portal.compose.127.0.0.1.sslip.io subnetcalc.dev.compose.127.0.0.1.sslip.io subnetcalc.uat.compose.127.0.0.1.sslip.io;

  location = /health {
    return 200 "ok\n";
  }

  return 301 https://$host:8443$request_uri;
}

server {
  listen 443 ssl default_server;
  server_name _;

  ssl_certificate /etc/nginx/certs/compose-platform.pem;
  ssl_certificate_key /etc/nginx/certs/compose-platform-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location = /health {
    return 200 "ok\n";
  }

  return 404;
}

server {
  listen 443 ssl;
  http2 on;
  server_name dex.compose.127.0.0.1.sslip.io;

  ssl_certificate /etc/nginx/certs/compose-platform.pem;
  ssl_certificate_key /etc/nginx/certs/compose-platform-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /health {
    return 200 "ok\n";
  }

  location = / {
    return 302 https://$http_host/dex/;
  }

  location = /dex {
    return 301 https://$http_host/dex/;
  }

  location /dex/ {
    set $upstream http://dex:5556;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 8443;
    proxy_pass $upstream;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name portal.compose.127.0.0.1.sslip.io;

  ssl_certificate /etc/nginx/certs/compose-platform.pem;
  ssl_certificate_key /etc/nginx/certs/compose-platform-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  proxy_buffer_size 16k;
  proxy_buffers 8 32k;
  proxy_busy_buffers_size 64k;

  location = /health {
    return 200 "ok\n";
  }

  location / {
    set $upstream http://oauth2-proxy-backstage:4180;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 8443;
    proxy_pass $upstream;
  }
}

