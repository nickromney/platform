apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: example-sentiment-router-to-api-l7-http
spec:
  description: |
    Example: L7 HTTP policy (method/path) between workloads in sentiment-dev.
    Not enabled by default (this file is not referenced by kustomization.yaml).

    NOTE: Adjust ports/paths to match your app. Applying L7 policies can break traffic if they don't match reality.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": sentiment-dev
      "k8s:app.kubernetes.io/name": sentiment-router
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sentiment-dev
            "k8s:app.kubernetes.io/name": sentiment-api
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/healthz"
              - method: "GET"
                path: "/api/.*"
              - method: "POST"
                path: "/api/.*"
