services:
  edge-proxy:
    image: ${EDGE_PROXY_IMAGE:-dhi.io/nginx:1.29.5-debian13}
    init: true
    read_only: true
    user: "${NGINX_UID:-101}:${NGINX_GID:-101}"
    depends_on:
      apim-simulator:
        condition: service_started
    ports:
      - "8088:8088"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=1777
      - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
      - /var/run:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./examples/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./examples/edge/certs:/etc/nginx/certs:ro
    networks:
      - apim

networks:
  apim:
