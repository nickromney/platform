worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream apim_gateway {
    server apim-simulator:8000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 8088;
    server_name apim.127.0.0.1.sslip.io *.apim.127.0.0.1.sslip.io edge.apim.127.0.0.1.sslip.io;

    location / {
      proxy_pass http://apim_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 8080;
    server_name apim.127.0.0.1.sslip.io *.apim.127.0.0.1.sslip.io edge.apim.127.0.0.1.sslip.io;

    return 308 https://$host:9443$request_uri;
  }

  server {
    listen 8443 ssl;
    server_name apim.127.0.0.1.sslip.io *.apim.127.0.0.1.sslip.io edge.apim.127.0.0.1.sslip.io;

    ssl_certificate /etc/nginx/certs/edge.apim.127.0.0.1.sslip.io.crt;
    ssl_certificate_key /etc/nginx/certs/edge.apim.127.0.0.1.sslip.io.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
      proxy_pass http://apim_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 300s;
    }
  }
}
