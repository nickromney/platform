apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-router-ingress
spec:
  description: >-
    Allow only SSO reverse-proxies to reach the subnetcalc router.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": subnetcalc-router
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-frontend-ingress
spec:
  description: >-
    Allow only the subnetcalc router to reach the subnetcalc frontend.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": frontend
      "k8s:app.kubernetes.io/name": subnetcalc-frontend
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-router
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
