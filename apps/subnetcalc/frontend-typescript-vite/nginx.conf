server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    location = /runtime-config.js {
        alias /tmp/runtime-config.js;
        add_header Cache-Control "no-store";
        default_type application/javascript;
    }

    location = /.auth/me {
        default_type application/json;
        add_header Cache-Control "no-store";

        set $user_email $http_x_auth_request_email;
        set $user_name $http_x_auth_request_preferred_username;
        set $user_id $http_x_auth_request_user;
        set $access_token $http_x_auth_request_access_token;
        set $access_token_json null;
        set $authorization_bearer "";

        if ($user_email = "") {
            set $user_email $http_x_forwarded_email;
        }

        if ($user_name = "") {
            set $user_name $http_x_forwarded_preferred_username;
        }

        if ($user_id = "") {
            set $user_id $http_x_forwarded_user;
        }

        if ($access_token = "") {
            set $access_token $http_x_forwarded_access_token;
        }

        if ($access_token = "") {
            set $access_token $http_x_access_token;
        }

        if ($http_authorization ~* "^Bearer (.+)$") {
            set $authorization_bearer $1;
        }

        if ($access_token = "") {
            set $access_token $authorization_bearer;
        }

        if ($access_token != "") {
            set $access_token_json "\"$access_token\"";
        }

        if ($user_name = "") {
            set $user_name $user_id;
        }

        if ($user_email = "") {
            set $user_email $user_id;
        }

        if ($user_id = "") {
            set $user_id $user_email;
        }

        if ($user_name = "") {
            set $user_name $user_email;
        }

        if ($user_id = "") {
            return 200 "[]";
        }

        return 200 "[{\"provider_name\":\"oauth2-proxy\",\"user_id\":\"$user_id\",\"access_token\":$access_token_json,\"claims\":[{\"typ\":\"name\",\"val\":\"$user_name\"},{\"typ\":\"email\",\"val\":\"$user_email\"},{\"typ\":\"preferred_username\",\"val\":\"$user_name\"}]}]";
    }

    location = /.auth/login/sso {
        if ($arg_post_login_redirect_uri != "") {
            return 302 /oauth2/sign_in?rd=$arg_post_login_redirect_uri;
        }

        return 302 /oauth2/sign_in;
    }

    location = /.auth/logout {
        if ($arg_post_logout_redirect_uri != "") {
            return 302 /oauth2/sign_out?rd=$arg_post_logout_redirect_uri;
        }

        return 302 /oauth2/sign_out;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Note: No backend proxy needed - the frontend reads API targets from
    # /runtime-config.js generated at container start.
}
