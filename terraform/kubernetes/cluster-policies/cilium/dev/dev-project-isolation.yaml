apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-sentiment-to-subnetcalc-dev
spec:
  description: >-
    Hard isolation in dev between the sentiment-llm and subnetcalc app
    boundaries within the kindlocal project.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": dev
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment-llm
  egressDeny:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
  ingressDeny:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": dev
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc

