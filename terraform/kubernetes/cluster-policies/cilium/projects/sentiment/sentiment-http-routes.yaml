apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sentiment-router-http-routes
spec:
  description: >-
    Restrict the sentiment router's egress to only the expected HTTP methods
    and paths through APIM, plus unrestricted proxying to the frontend.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": sentiment-router
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health.*"
              - method: "GET"
                path: "/api/v1/comments.*"
              - method: "POST"
                path: "/api/v1/comments.*"
              - method: "POST"
                path: "/api/v1/sentiment/classify"
    - toEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": sentiment
            "k8s:tier": frontend
            "k8s:app.kubernetes.io/name": sentiment-auth-ui
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
