apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: sentiment-router-l7-uat
spec:
  description: >-
    L7 HTTP policy for sentiment-router in uat namespace. Restricts the
    router's egress to only the expected HTTP methods and paths on the
    backend API, plus unrestricted proxy to the frontend (static SPA).
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:app.kubernetes.io/name": sentiment-router
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:app.kubernetes.io/name": sentiment-api
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health"
              - method: "GET"
                path: "/api/v1/comments"
              - method: "POST"
                path: "/api/v1/comments"
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:app.kubernetes.io/name": sentiment-auth-ui
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
