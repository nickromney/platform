# TLS 1.3 termination proxy for sentiment
# Mozilla Modern profile: https://wiki.mozilla.org/Security/Server_Side_TLS#Modern_compatibility
#
# Architecture: Browser → this proxy (TLS 1.3) → oauth2-proxy (HTTP) → edge → services

server {
    listen 8443 ssl;
    http2 on;
    server_name localhost;

    # Certificates (mounted via compose.tls.yml from pki/)
    ssl_certificate     /etc/nginx/certs/server-fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Mozilla Modern: TLS 1.3 only
    ssl_protocols TLSv1.3;

    # TLS 1.3 cipher suites (explicit — matches Mozilla Modern)
    # nginx uses ssl_conf_command for TLS 1.3 ciphersuites (requires nginx >= 1.19.4)
    ssl_conf_command Ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

    # Elliptic curves (Mozilla Modern)
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    # Client chooses cipher (Mozilla Modern — clients know if they have hardware AES)
    ssl_prefer_server_ciphers off;

    # Disable TLS session tickets for stronger forward secrecy
    ssl_session_tickets off;

    # HSTS: 2 years (Mozilla Modern requirement)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker's embedded DNS — needed for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream "oauth2-proxy:4180";
        proxy_pass http://$upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8443;
    }
}

# HTTP → HTTPS redirect
server {
    listen 8080;
    server_name localhost;
    return 301 https://$host$request_uri;
}
