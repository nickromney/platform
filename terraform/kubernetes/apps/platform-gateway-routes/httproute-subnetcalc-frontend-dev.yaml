apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: subnetcalc-frontend-dev
  namespace: gateway-routes
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - subnetcalc-frontend.dev.127.0.0.1.sslip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: subnetcalc-frontend
          namespace: dev
          port: 8080
          weight: 100
        - group: ""
          kind: Service
          name: subnetcalc-frontend-canary
          namespace: dev
          port: 8080
          weight: 0
