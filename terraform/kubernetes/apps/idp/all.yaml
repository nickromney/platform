apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
    app: idp-core
    project: kindlocal
    team: platform
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-core
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-core
        app.kubernetes.io/component: api
        app: idp-core
        project: kindlocal
        team: platform
        tier: backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: localhost:30090/platform/idp-core:latest
          imagePullPolicy: Always
          env:
            - name: IDP_RUNTIME
              value: kind
            - name: IDP_PUBLIC_URL
              value: https://portal.127.0.0.1.sslip.io
            - name: IDP_API_PUBLIC_URL
              value: https://portal-api.127.0.0.1.sslip.io
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
    app: idp-core
    project: kindlocal
    team: platform
    tier: backend
spec:
  selector:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
  ports:
    - name: http
      appProtocol: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: idp
  labels:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
    app: backstage
    project: kindlocal
    team: platform
    tier: frontend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-kubernetes-reader
  labels:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
    app: backstage
    project: kindlocal
    team: platform
    tier: frontend
rules:
  - apiGroups: [""]
    resources: ["configmaps", "endpoints", "namespaces", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-reader
  labels:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
    app: backstage
    project: kindlocal
    team: platform
    tier: frontend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-kubernetes-reader
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: idp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  labels:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
    app: backstage
    project: kindlocal
    team: platform
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backstage
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
        app.kubernetes.io/component: frontend
        app: backstage
        project: kindlocal
        team: platform
        tier: frontend
    spec:
      serviceAccountName: backstage
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backstage
          image: localhost:30090/platform/backstage:latest
          imagePullPolicy: Always
          env:
            - name: BACKSTAGE_BASE_URL
              value: https://portal.127.0.0.1.sslip.io
            - name: GITEA_BASE_URL
              value: http://gitea-http.gitea.svc.cluster.local:3000
            - name: GITEA_PUBLIC_BASE_URL
              value: https://gitea.admin.127.0.0.1.sslip.io
            - name: GITEA_OWNER
              value: platform
            - name: GITEA_OWNER_IS_ORG
              value: "true"
            - name: GITEA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backstage-gitea-credentials
                  key: username
            - name: GITEA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-gitea-credentials
                  key: password
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 7007
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  labels:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
    app: backstage
    project: kindlocal
    team: platform
    tier: frontend
spec:
  selector:
    app.kubernetes.io/name: backstage
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      appProtocol: http
      port: 7007
      targetPort: http
