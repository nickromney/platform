apiVersion: apps/v1
kind: Deployment
metadata:
  name: subnetcalc-api
spec:
  template:
    spec:
      containers:
        - name: subnetcalc-api-fastapi-container-app
          image: host.docker.internal:5002/platform/subnetcalc-api:golden
        - name: subnetcalc-frontend-react
          image: host.docker.internal:5002/platform/subnetcalc-frontend-react:golden
        - name: subnetcalc-frontend-typescript-vite
          image: host.docker.internal:5002/platform/subnetcalc-frontend-typescript-vite:golden
