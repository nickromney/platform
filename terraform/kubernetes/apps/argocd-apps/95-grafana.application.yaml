apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "95"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        image:
          registry: __GRAFANA_IMAGE_REGISTRY__
          repository: __GRAFANA_IMAGE_REPOSITORY__
          tag: __GRAFANA_IMAGE_TAG__
        sidecar:
          image:
            registry: __GRAFANA_SIDECAR_IMAGE_REGISTRY__
            repository: __GRAFANA_SIDECAR_IMAGE_REPOSITORY__
            tag: __GRAFANA_SIDECAR_IMAGE_TAG__
        admin:
          existingSecret: grafana-admin-credentials
          userKey: admin-user
          passwordKey: admin-password
        persistence:
          enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi
        extraInitContainers:
          - name: stage-victorialogs-plugin
            image: __GRAFANA_IMAGE_REGISTRY__/__GRAFANA_IMAGE_REPOSITORY__:__GRAFANA_IMAGE_TAG__
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
            args:
              - |
                plugin_src=/opt/grafana/plugins/victoriametrics-logs-datasource
                plugin_dst=/var/lib/grafana/plugins/victoriametrics-logs-datasource
                if [ ! -d "${plugin_src}" ]; then
                  exit 0
                fi
                mkdir -p /var/lib/grafana/plugins
                rm -rf "${plugin_dst}"
                cp -a "${plugin_src}" "${plugin_dst}"
            volumeMounts:
              - name: storage
                mountPath: /var/lib/grafana
        env:
          TMPDIR: /var/lib/grafana
__GRAFANA_PLUGINS_VALUES__
        livenessProbe:
          initialDelaySeconds: __GRAFANA_LIVENESS_INITIAL_DELAY_SECONDS__
        service:
          type: ClusterIP
          port: 3000
        grafana.ini:
          server:
            root_url: https://grafana.admin.127.0.0.1.sslip.io
          dashboards:
            default_home_dashboard_path: /var/lib/grafana/dashboards/default/platform-launchpad.json
          auth:
            disable_login_form: true
          auth.proxy:
            enabled: true
            # oauth2-proxy forwards the stable user email separately from the opaque OIDC subject.
            # Use the email header so Grafana keys auth-proxy users consistently.
            header_name: X-Forwarded-Email
            header_property: email
            auto_sign_up: true
          users:
            viewers_can_edit: true
          explore:
            enabled: true
          unified_alerting:
            enabled: false
          feature_toggles:
            enable: traceToMetrics traceToLogsV2 correlationsMetricsCorrelations
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: Platform
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
              - name: kubernetes
                orgId: 1
                folder: Kubernetes
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/kubernetes
              - name: cilium
                orgId: 1
                folder: Cilium
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/cilium
              - name: argocd
                orgId: 1
                folder: ArgoCD
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/argocd
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://prometheus-server.observability.svc.cluster.local
                isDefault: true
                jsonData:
                  timeInterval: 15s
                  httpMethod: POST
              - name: VictoriaLogs
                type: victoriametrics-logs-datasource
                access: proxy
                url: http://victoria-logs-victoria-logs-single-server.observability.svc.cluster.local:9428
                uid: victorialogs
                jsonData:
                  maxLines: 1000
              - name: Loki
                type: loki
                access: proxy
                url: http://loki.observability.svc.cluster.local:3100
                uid: loki
                jsonData:
                  maxLines: 1000
                  derivedFields:
                    - datasourceUid: tempo
                      matcherRegex: '"traceId":"([a-f0-9]+)"'
                      name: TraceID
                      url: '$${__value.raw}'
              - name: Tempo
                type: tempo
                access: proxy
                url: http://tempo.observability.svc.cluster.local:3100
                uid: tempo
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    spanStartTimeShift: '-1h'
                    spanEndTimeShift: '1h'
                    filterByTraceID: true
                    filterBySpanID: false
                  tracesToMetrics:
                    datasourceUid: prometheus
                    tags:
                      - name: service.name
                        value: service
                    queries:
                      - name: Request Rate
                        query: 'sum(rate(traces_span_metrics_calls_total{service_name="$${service}"}[5m]))'
                  serviceMap:
                    datasourceUid: prometheus
                  search:
                    hide: false
                  nodeGraph:
                    enabled: true
