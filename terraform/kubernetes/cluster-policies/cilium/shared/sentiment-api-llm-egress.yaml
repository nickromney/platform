apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-sentiment-api-llm-egress
spec:
  description: |
    Allow sentiment-api pods in dev and uat to reach a direct external LLM
    gateway on the host. This policy is only required when the direct gateway
    mode is selected; LiteLLM mode keeps traffic in-cluster.
    The sync script renders this policy to the specific CIDR that backs
    LLM_GATEWAY_EXTERNAL_NAME because host-backed names such as
    host.docker.internal do not reliably populate Cilium's FQDN allowlist.
  endpointSelector:
    matchExpressions:
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - sentiment-api
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - application
  egress:
    - toCIDRSet:
        - cidr: "__LLM_GATEWAY_EXTERNAL_CIDR__"
      toPorts:
        - ports:
            - port: "12434"
              protocol: TCP
