<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sentiment (Authenticated)</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Sentiment</h1>
          <p>Classify comments with a minimal vanilla UI and Go API.</p>
        </div>
        <div class="header-actions">
          <div id="user-info" class="user-info" hidden>
            <span id="auth-state">Not signed in.</span>
            <button id="login-btn" type="button" hidden>Sign In</button>
            <button id="logout-btn" type="button" hidden>Sign Out</button>
          </div>
          <button id="theme-switcher" type="button">
            <span id="theme-icon">Light</span>
          </button>
        </div>
      </header>
      <section>
        <p id="status">Loading comments...</p>
        <div id="diagnostics" class="diagnostics" aria-live="polite"></div>
        <form id="comment-form">
          <label for="comment-text">Comment</label>
          <textarea id="comment-text" rows="5" placeholder="Write a short comment"></textarea>
          <div class="samples">
            <button type="button" data-sample="positive">Positive sample</button>
            <button type="button" data-sample="mixed">Mixed sample</button>
            <button type="submit" data-action="analyze">Analyze</button>
          </div>
        </form>
      </section>
      <section>
        <h2>Recent Comments</h2>
        <div id="comments"></div>
      </section>
    </main>
    <script src="/runtime-config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
