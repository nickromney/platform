apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: argo-rollouts-hardened
spec:
  description: >-
    Hardened policy for the Argo Rollouts controller namespace. The controller
    watches and updates Kubernetes resources through the API server, and
    downloads the Gateway API traffic router plugin binary from GitHub
    releases at startup, so it gets DNS-observed FQDN egress pinned to GitHub
    plus the release-asset CDN. The Gateway API plugin itself does not require
    additional in-cluster egress beyond the controller API-server path.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": argo-rollouts
      "k8s:app.kubernetes.io/name": argo-rollouts
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: github.com
        - matchPattern: "*.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": argo-rollouts
