apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: local-idp
  description: Local internal developer platform running on kind or Lima.
spec:
  owner: group:default/platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage
  title: Developer Portal
  description: Backstage portal for catalog, templates, and local platform self-service.
  annotations:
    backstage.io/source-location: url:https://gitea.admin.127.0.0.1.sslip.io/platform/platform/src/branch/main/apps/backstage/
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-label-selector: app=backstage
  links:
    - url: https://portal.127.0.0.1.sslip.io
      title: Portal
      icon: dashboard
    - url: https://grafana.admin.127.0.0.1.sslip.io/d/backstage-observability/backstage-observability
      title: Backstage Observability
      icon: dashboard
spec:
  type: website
  lifecycle: platform
  owner: group:default/platform
  system: local-idp
  dependsOn:
    - component:default/idp-core
  consumesApis:
    - idp-api
