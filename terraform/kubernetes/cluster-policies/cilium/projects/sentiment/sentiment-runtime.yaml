      "k8s:team": dolphin
      "k8s:app": sentiment-llm
      "k8s:tier": backend
      "k8s:app.kubernetes.io/name": sentiment-api
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": sentiment-llm
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": sentiment-router
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
