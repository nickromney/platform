---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-auth-ui
  labels:
    app.kubernetes.io/name: sentiment-auth-ui
    app.kubernetes.io/component: frontend
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: frontend
    role: frontend
spec:
  selector:
    app.kubernetes.io/name: sentiment-auth-ui
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      appProtocol: http
      port: 8080
      targetPort: http

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentiment-router-nginx
  labels:
    app.kubernetes.io/name: sentiment-router
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: gateway
    role: gateway
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      absolute_redirect off;

      location = /.auth/me {
        default_type application/json;
        add_header Cache-Control "no-store";

        set $user_email $http_x_auth_request_email;
        if ($user_email = "") { set $user_email $http_x_forwarded_email; }

        set $user_name $http_x_auth_request_user;
        if ($user_name = "") { set $user_name $user_email; }

        set $access_token_json null;
        if ($http_x_auth_request_access_token != "") { set $access_token_json "\"$http_x_auth_request_access_token\""; }

        set $forwarded_access_token_json null;
        if ($http_x_forwarded_access_token != "") { set $forwarded_access_token_json "\"$http_x_forwarded_access_token\""; }

        if ($access_token_json = null) { set $access_token_json $forwarded_access_token_json; }

        return 200 "[{\"provider_name\":\"oauth2-proxy\",\"user_id\":\"$user_email\",\"access_token\":$access_token_json,\"claims\":[{\"typ\":\"name\",\"val\":\"$user_name\"},{\"typ\":\"email\",\"val\":\"$user_email\"},{\"typ\":\"preferred_username\",\"val\":\"$user_email\"}]}]";
      }

      location ~ ^/\.auth/login/ {
        return 302 https://$host/oauth2/start?rd=/;
      }

      location = /.auth/logout {
        return 302 https://$host/oauth2/sign_out?rd=/signed-out.html;
      }

      location = /health {
        return 200 '{"status":"ok","role":"router","service":"sentiment-router"}';
      }

      location = /health/ready {
        return 200 '{"status":"ready","role":"router"}';
      }

      location = /health/live {
        return 200 '{"status":"alive","role":"router"}';
      }

      location ^~ /api/ {
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        send_timeout 180s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        set $api_token $http_x_auth_request_access_token;
        if ($api_token = "") { set $api_token $http_x_forwarded_access_token; }

        set $api_auth "";
        if ($api_token != "") { set $api_auth "Bearer $api_token"; }
        if ($api_auth = "") { set $api_auth $http_authorization; }
        proxy_set_header Authorization $api_auth;
        proxy_set_header X-Apim-Bypass-Subscription true;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://subnetcalc-apim-simulator.apim.svc.cluster.local:8000;
      }

      location = /api {
        return 301 /api/;
      }

      location = /signed-out.html {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }

      location = /style.css {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }

      location = /app-shell.css {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }

      location = /favicon.ico {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }

      location / {
        if ($http_user_agent ~* "kube-probe") { return 200; }

        set $auth_email $http_x_auth_request_email;
        if ($auth_email = "") { set $auth_email $http_x_forwarded_email; }
        if ($auth_email = "") { return 302 https://$host/oauth2/start?rd=$uri; }

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-router
  labels:
    app.kubernetes.io/name: sentiment-router
    app.kubernetes.io/component: gateway
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: gateway
    role: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentiment-router
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentiment-router
        app.kubernetes.io/component: gateway
        app: sentiment
        project: kindlocal
        team: dolphin
        tier: gateway
        role: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: dhi.io/nginx:1.29.5-debian13
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run/nginx
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: nginx-conf
          configMap:
            name: sentiment-router-nginx
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-router
  labels:
    app.kubernetes.io/name: sentiment-router
    app.kubernetes.io/component: gateway
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: gateway
    role: gateway
spec:
  selector:
    app.kubernetes.io/name: sentiment-router
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      appProtocol: http
      port: 8080
      targetPort: http

