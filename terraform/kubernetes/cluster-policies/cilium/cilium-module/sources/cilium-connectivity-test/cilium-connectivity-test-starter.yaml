apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cilium-connectivity-test-starter
  annotations:
    "policies.cilium.io/title": "Cilium connectivity test starter"
    "platform.publiccloudexperiments.net/source-kind": "CiliumClusterwideNetworkPolicy"
specs:
  - description: >-
      Starter-pack baseline for cilium connectivity test workloads created by
      cilium-cli. Moves the test pods into policy mode, but keeps kubelet
      probes, DNS, and Kubernetes API access working so enforcement can be
      demonstrated safely without touching non-test namespaces.
    endpointSelector:
      matchExpressions:
        - key: "k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/name"
          operator: In
          values:
            - cilium-cli
        - key: "k8s:kind"
          operator: In
          values:
            - client
            - echo
            - l7-lb
    ingress:
      - fromEntities:
          - host
          - remote-node
    egress:
      - toEndpoints:
          - matchLabels:
              "k8s:io.kubernetes.pod.namespace": kube-system
              "k8s:k8s-app": kube-dns
          - matchLabels:
              "k8s:io.kubernetes.pod.namespace": kube-system
              "k8s:app.kubernetes.io/name": coredns
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      - toEntities:
          - kube-apiserver
      - toServices:
          - k8sService:
              namespace: default
              serviceName: kubernetes
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
  - description: >-
      Allow the client pods in cilium-cli test namespaces to egress to the
      echo and l7-lb test workloads on HTTP 8080. Once the clients are in
      policy mode, this explicit egress allowance is required in addition to
      the matching ingress rule on the destination.
    endpointSelector:
      matchExpressions:
        - key: "k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/name"
          operator: In
          values:
            - cilium-cli
        - key: "k8s:kind"
          operator: In
          values:
            - client
    egress:
      - toEndpoints:
          - matchExpressions:
              - key: "k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/name"
                operator: In
                values:
                  - cilium-cli
              - key: "k8s:kind"
                operator: In
                values:
                  - echo
                  - l7-lb
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
  - description: >-
      Allow the client pods in cilium-cli test namespaces to reach the echo and
      l7-lb test workloads on HTTP 8080 on the destination side as well.
      Together with the explicit client egress rule, this gives a complete
      allow path for the safe demo traffic while everything else remains
      denied.
    endpointSelector:
      matchExpressions:
        - key: "k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/name"
          operator: In
          values:
            - cilium-cli
        - key: "k8s:kind"
          operator: In
          values:
            - echo
            - l7-lb
    ingress:
      - fromEndpoints:
          - matchExpressions:
              - key: "k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/name"
                operator: In
                values:
                  - cilium-cli
              - key: "k8s:kind"
                operator: In
                values:
                  - client
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
