apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: uat-mtls-subnetcalc
spec:
  description: >-
    Strict role-based access for subnetcalc workloads in uat namespace.
    With WireGuard enabled all inter-node traffic is encrypted (mTLS at L3/L4).
    Traffic flow (verified via nginx configs and APIM config):
      oauth2-proxy (sso)            -> subnetcalc-router (gateway, :8080)
      subnetcalc-router             -> subnetcalc-frontend (frontend, :8080)
      subnetcalc-router             -> subnetcalc-apim-simulator (apim ns, :8000)
      subnetcalc-apim-simulator     -> subnetcalc-api (backend, :8000)  [CROSS-NS apim->uat]
      subnetcalc-apim-simulator     -> dex (sso, :5556 for JWKS)
      subnetcalc-api                -> otel-collector (observability, :4317/:4318)
    The backend receives traffic ONLY from APIM (apim ns), never from the
    router or platform-gateway directly. The frontend is a static SPA served
    by the router and does not initiate any backend connections.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:project": subnetcalc

  # --- INGRESS ---
  ingress:
    # oauth2-proxy (sso ns) -> subnetcalc-router (role=gateway) on port 8080
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # subnetcalc-router (role=gateway) -> subnetcalc-frontend (role=frontend) on port 8080
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": subnetcalc
            "k8s:role": gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # subnetcalc-apim-simulator (apim ns) -> subnetcalc-api (role=backend) on port 8000
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": subnetcalc
            "k8s:role": apim
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP

  # --- EGRESS ---
  egress:
    # subnetcalc-router -> subnetcalc-frontend :8080
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": subnetcalc
            "k8s:role": frontend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # subnetcalc-router -> subnetcalc-apim-simulator (apim ns) :8000
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": subnetcalc
            "k8s:role": apim
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # subnetcalc-api -> otel-collector (observability)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            "k8s:app.kubernetes.io/name": otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
