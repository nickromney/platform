            platform-overview:
              json: |
                {
                  "annotations": {"list": []},
                  "editable": true,
                  "graphTooltip": 0,
                  "panels": [
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
                      "id": 1,
                      "targets": [
                        {
                          "expr": "sum(rate(http_server_requests_seconds_count{namespace=~\"dev|uat\"}[5m])) by (k8s_namespace_name)",
                          "legendFormat": "{{k8s_namespace_name}}",
                          "refId": "A"
                        }
                      ],
                      "title": "HTTP request rate (5m)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
                      "id": 2,
                      "targets": [
                        {
                          "expr": "sum(rate(http_server_requests_seconds_count{namespace=~\"dev|uat\",status=~\"5..\"}[5m])) by (k8s_namespace_name) / clamp_min(sum(rate(http_server_requests_seconds_count{namespace=~\"dev|uat\"}[5m])) by (k8s_namespace_name), 1)",
                          "legendFormat": "{{k8s_namespace_name}}",
                          "refId": "A"
                        }
                      ],
                      "title": "5xx error ratio",
                      "type": "timeseries"
                    },
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "ms"}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
                      "id": 3,
                      "targets": [
                        {
                          "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace=~\"dev|uat\"}[5m])) by (le,k8s_namespace_name)) * 1000",
                          "legendFormat": "{{k8s_namespace_name}}",
                          "refId": "A"
                        }
                      ],
                      "title": "HTTP latency p95 (ms)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
                      "id": 4,
                      "targets": [
                        {
                          "expr": "sum(increase(sentiment_comments_created_total{k8s_namespace_name=~\"dev|uat\"}[1h])) by (k8s_namespace_name)",
                          "legendFormat": "{{k8s_namespace_name}}",
                          "refId": "A"
                        }
                      ],
                      "title": "Sentiment comments (last 1h)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "ms"}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
                      "id": 5,
                      "targets": [
                        {
                          "expr": "histogram_quantile(0.95, sum(rate(llm_inference_latency_ms_bucket{k8s_namespace_name=~\"dev|uat\"}[5m])) by (le,k8s_namespace_name))",
                          "legendFormat": "{{k8s_namespace_name}}",
                          "refId": "A"
                        }
                      ],
                      "title": "LLM inference p95 (ms)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": "Prometheus",
                      "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
                      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
                      "id": 6,
                      "targets": [
                        {
                          "expr": "avg(up{service=\"otel-collector\"})",
                          "refId": "A"
                        }
                      ],
                      "title": "Collector scrape availability",
                      "type": "stat"
                    }
                  ],
                  "refresh": "30s",
                  "schemaVersion": 39,
                  "tags": ["platform", "otel", "dev", "uat"],
                  "templating": {"list": []},
