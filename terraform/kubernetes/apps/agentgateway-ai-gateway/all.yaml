apiVersion: v1
kind: Secret
metadata:
  name: omlx-secret
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: agentgateway-ai-gateway
    app.kubernetes.io/component: llm-backend-auth
type: Opaque
stringData:
  # Local oMLX serves an OpenAI-compatible API on the host and accepts Bearer auth.
  Authorization: "Bearer 1234"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-ai-gateway
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: agentgateway-ai-gateway
    app.kubernetes.io/component: ai-gateway
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-ai-gateway
  listeners:
    - protocol: HTTP
      port: 80
      name: http
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-ai-gateway
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: agentgateway-ai-gateway
    app.kubernetes.io/component: ai-gateway-runtime
spec:
  deployment:
    spec:
      template:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agentgateway
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: local-openai-compatible
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: agentgateway-ai-gateway
    app.kubernetes.io/component: llm-backend
spec:
  static:
    host: host.docker.internal
    port: 8000
  policies:
    auth:
      secretRef:
        name: omlx-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openai-chat-completions
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: agentgateway-ai-gateway
    app.kubernetes.io/component: llm-route
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-ai-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: local-openai-compatible
          namespace: agentgateway-system
          weight: 1
