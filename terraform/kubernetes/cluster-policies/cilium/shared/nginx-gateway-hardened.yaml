apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: nginx-gateway-hardened
spec:
  description: >-
    Hardened policy for the NGINX Gateway Fabric controller namespace. The
    controller watches Gateway API resources, writes status, and serves kubelet
    health probes. Keep egress limited to DNS and the Kubernetes API.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": nginx-gateway
      "k8s:app.kubernetes.io/name": nginx-gateway
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
