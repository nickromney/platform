apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict container image registries
    policies.kyverno.io/description: >-
      Only allow container images that were either:
        (a) pulled from registries listed in the target-owned preload image
            lists under kubernetes/*/preload-images.txt,
        (b) built by Gitea Actions CI/CD (pushed to localhost:30090), or
        (c) built locally for supported local fallback paths (for example
            host.lima.internal:5002 or host.docker.internal:5002).
      This policy is intentionally kept in Audit mode for teaching/demo use.
spec:
  admission: true
  background: true
  validationFailureAction: Audit
  rules:
    - name: validate-image-source
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - dev
                - uat
                - apim
                - observability
                - sso
                - headlamp
                - gitea
                - gitea-runner
      validate:
        allowExistingViolations: true
        message: >-
          Container image is not from an approved source.
          Only images from registries listed in kubernetes/*/preload-images.txt,
          images built by Gitea CI/CD (localhost:30090/*), Lima local-build
          images (host.lima.internal:5002/*), and Docker Desktop local-build
          images (host.docker.internal:5002/*) are allowed.
        foreach:
          - list: "request.object.spec.[initContainers, containers][]"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: AnyNotIn
                    value:
                      # --- Gitea CI/CD built images ---
                      - "localhost:30090/*"
                      # --- Local build caches ---
                      - "host.lima.internal:5002/*"
                      - "host.docker.internal:5002/*"
                      - "192.168.65.254:5002/*"
                      # --- Registries present in kubernetes/*/preload-images.txt ---
                      - "quay.io/*"
                      - "ghcr.io/*"
                      - "dhi.io/*"
                      - "ecr-public.aws.com/*"
                      - "docker.gitea.com/*"
                      - "docker.io/*"
                      - "signoz/*"
                      - "otel/*"
                      - "docker:*"
                      - "gitea/*"
                      - "python:*"
                      - "node:*"
                      - "curlimages/*"
