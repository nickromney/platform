apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-redis
    app.kubernetes.io/component: redis
spec:
  serviceName: langfuse-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-redis
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/redis:8.2.7-alpine
          args:
            - redis-server
            - --requirepass
            - $(REDIS_AUTH)
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: redis-auth
          startupProbe:
            tcpSocket:
              port: redis
            periodSeconds: 3
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi
