x-python-build-args: &python-build-args
  PYTHON_BUILD_IMAGE: ${PYTHON_BUILD_IMAGE:-dhi.io/python:3.13-debian13-dev}
  PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-dhi.io/python:3.13-debian13}
  APP_UID: ${APP_UID:-65532}
  APP_GID: ${APP_GID:-65532}

x-python-service-hardening: &python-service-hardening
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  hello-api:
    <<: *python-service-hardening
    build:
      context: .
      dockerfile: examples/hello-api/Dockerfile
      args: *python-build-args
    image: apim-simulator-hello-api:latest
    expose:
      - "8000"
    environment:
      OTEL_SERVICE_NAME: hello-api
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - apim

  apim-simulator:
    environment:
      APIM_CONFIG_PATH: /tmp/hello-apim-config.json
      APIM_CONFIG_SOURCE_PATH: ${HELLO_APIM_CONFIG_PATH:-/app/examples/hello-api/apim.anonymous.json}
      OTEL_SERVICE_NAME: apim-simulator
    depends_on:
      hello-api:
        condition: service_healthy

networks:
  apim:
