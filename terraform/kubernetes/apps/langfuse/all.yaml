apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/component: config
type: Opaque
stringData:
  nextauth-secret: local-langfuse-nextauth-secret
  salt: local-langfuse-salt
  encryption-key: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
  postgres-password: local-langfuse-postgres
  clickhouse-password: local-langfuse-clickhouse
  redis-auth: local-langfuse-redis
  minio-root-user: minio
  minio-root-password: local-langfuse-minio
  init-user-password: local-langfuse-admin
  database-url: postgresql://langfuse:local-langfuse-postgres@langfuse-postgres.langfuse.svc.cluster.local:5432/langfuse
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-env
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/component: config
data:
  NEXTAUTH_URL: https://langfuse.admin.127.0.0.1.sslip.io
  AUTH_KEYCLOAK_CLIENT_ID: langfuse
  AUTH_KEYCLOAK_ISSUER: https://keycloak.127.0.0.1.sslip.io/realms/platform
  AUTH_KEYCLOAK_SCOPE: "openid email profile groups"
  AUTH_KEYCLOAK_ALLOW_ACCOUNT_LINKING: "true"
  AUTH_DOMAINS_WITH_SSO_ENFORCEMENT: admin.test
  AUTH_DISABLE_SIGNUP: "true"
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse.langfuse.svc.cluster.local:9000
  CLICKHOUSE_URL: http://langfuse-clickhouse.langfuse.svc.cluster.local:8123
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio.langfuse.svc.cluster.local:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio.langfuse.svc.cluster.local:9000
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
  LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
  LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
  LANGFUSE_S3_BATCH_EXPORT_PREFIX: exports/
  LANGFUSE_S3_BATCH_EXPORT_REGION: auto
  LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://langfuse-minio.langfuse.svc.cluster.local:9000
  LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT: http://langfuse-minio.langfuse.svc.cluster.local:9000
  LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: minio
  LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
  REDIS_HOST: langfuse-redis.langfuse.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_TLS_ENABLED: "false"
  EMAIL_FROM_ADDRESS: ""
  SMTP_CONNECTION_URL: ""
  LANGFUSE_INIT_ORG_ID: local-platform
  LANGFUSE_INIT_ORG_NAME: Local Platform
  LANGFUSE_INIT_PROJECT_ID: local-platform-project
  LANGFUSE_INIT_PROJECT_NAME: Platform Memory
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-platform
  LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-platform
  LANGFUSE_INIT_USER_EMAIL: demo@admin.test
  LANGFUSE_INIT_USER_NAME: Demo Admin
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/component: postgres
spec:
  serviceName: langfuse-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/postgres:17.6-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
          startupProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/name: langfuse-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-redis
    app.kubernetes.io/component: redis
spec:
  serviceName: langfuse-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-redis
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/redis:8.2.3-alpine
          args:
            - redis-server
            - --requirepass
            - $(REDIS_AUTH)
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: redis-auth
          startupProbe:
            tcpSocket:
              port: redis
            periodSeconds: 3
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi
---
