services:
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      ENABLE_LOGS_ALL: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - lgtm-data:/data
      - ./observability/grafana/provisioning/dashboards/apim-simulator.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/apim-simulator.yaml:ro
      - ./observability/grafana/dashboards:/otel-lgtm/custom-dashboards:ro
    networks:
      - apim

  apim-simulator:
    environment:
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_DEPLOYMENT_ENVIRONMENT: local
      OTEL_SERVICE_NAMESPACE: apim-simulator
    depends_on:
      lgtm:
        condition: service_started

volumes:
  lgtm-data:
