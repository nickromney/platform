apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: review-environment-manager
  namespace: review
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: act-runner-review-environment-manager
  namespace: review
subjects:
  - kind: ServiceAccount
    name: act-runner
    namespace: gitea-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: review-environment-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: review-route-manager
  namespace: gateway-routes
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: act-runner-review-route-manager
  namespace: gateway-routes
subjects:
  - kind: ServiceAccount
    name: act-runner
    namespace: gitea-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: review-route-manager
