# Shared workloads for sentiment and subnetcalc (dev/uat overlays set namespace)
# Labels: project/team/app/tier define the coarse trust boundary.
# role remains for component-specific detail such as llm and apim.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentiment-api-data
  labels:
    app.kubernetes.io/name: sentiment-api
    app.kubernetes.io/component: backend
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: backend
    role: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api
  labels:
    app.kubernetes.io/name: sentiment-api
    app.kubernetes.io/component: backend
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: backend
    role: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentiment-api
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentiment-api
        app.kubernetes.io/component: backend
        app: sentiment
        project: kindlocal
        team: dolphin
        tier: backend
        role: backend
    spec:
      imagePullSecrets:
        - name: gitea-registry-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: localhost:30090/platform/sentiment-api:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: "/data"
            - name: CSV_PATH
              value: "/data/comments.csv"
            - name: SENTIMENT_MODEL_CACHE_DIR
              value: "/opt/transformers-cache"
            - name: SENTIMENT_MODEL_LOCAL_ONLY
              value: "1"
            - name: OTEL_SERVICE_NAME
              value: "sentiment-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 1280Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentiment-api-data
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-api
  labels:
    app.kubernetes.io/name: sentiment-api
    app.kubernetes.io/component: backend
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: backend
    role: backend
spec:
  selector:
    app.kubernetes.io/name: sentiment-api
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
