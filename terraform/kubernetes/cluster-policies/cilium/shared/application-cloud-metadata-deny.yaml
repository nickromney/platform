apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-application-cloud-metadata
spec:
  description: >-
    Deny cloud metadata egress for end-user application pods.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - application
      - key: "k8s:tier"
        operator: In
        values:
          - backend
          - frontend
          - gateway
  egressDeny:
    - toCIDRSet:
        - cidr: 169.254.169.254/32
