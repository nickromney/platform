apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: auth-chat-hardened
spec:
  description: >-
    Hardened policy for Auth Chat. oauth2-proxy is the only permitted ingress
    source and chat completions must go through the in-cluster agentgateway
    OpenAI-compatible route.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": dev
      "k8s:app.kubernetes.io/name": auth-chat
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
            "k8s:app.kubernetes.io/name": oauth2-proxy
            "k8s:app.kubernetes.io/instance": oauth2-proxy-auth-chat
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": agentgateway-system
            "k8s:app.kubernetes.io/name": agentgateway-ai-gateway
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
