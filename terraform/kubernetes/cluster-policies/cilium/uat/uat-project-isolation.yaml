apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-sentiment-to-subnetcalc-uat
spec:
  description: Hard isolation - deny sentiment project to subnetcalc project in uat namespace.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:project": sentiment
  egressDeny:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": subnetcalc
  ingressDeny:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": subnetcalc

---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-subnetcalc-to-sentiment-uat
spec:
  description: Hard isolation - deny subnetcalc project to sentiment project in uat namespace.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:project": subnetcalc
  egressDeny:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": sentiment
  ingressDeny:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:project": sentiment
