apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: apim-simulator-local
  title: APIM Simulator
  description: Local Azure API Management simulator for gateway, policy, product, and management API workflows.
spec:
  owner: group:default/apim-simulator-maintainers
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: apim-simulator
  title: APIM Simulator Gateway
  description: Config-driven APIM-compatible gateway and management plane for local API platform testing.
  tags:
    - apim
    - gateway
    - local
  annotations:
    backstage.io/source-location: url:https://github.com/nickromney/apim-simulator/tree/main/
  links:
    - url: http://localhost:8000/apim/health
      title: Gateway health
      icon: api
    - url: http://localhost:3007
      title: Operator console
      icon: dashboard
spec:
  type: service
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  providesApis:
    - apim-simulator-gateway-api
    - apim-simulator-management-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: apim-simulator-gateway-api
  title: APIM Simulator Gateway API
  description: Runtime gateway surface that accepts proxied API requests and APIM health checks.
  tags:
    - openapi
    - gateway
spec:
  type: openapi
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  definition: |
    openapi: 3.0.3
    info:
      title: APIM Simulator Gateway API
      version: 0.4.0
      description: Local gateway surface exposed by the APIM simulator.
    servers:
      - url: http://localhost:8000
        description: Default local gateway
    paths:
      /apim/health:
        get:
          summary: Check simulator health
          responses:
            '200':
              description: Gateway health state
      /api/{path}:
        get:
          summary: Proxy a GET request to the configured upstream API
          parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
          responses:
            default:
              description: Upstream response
        post:
          summary: Proxy a POST request to the configured upstream API
          parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
          responses:
            default:
              description: Upstream response
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: apim-simulator-management-api
  title: APIM Simulator Management API
  description: Local APIM management surface for APIs, products, subscriptions, named values, and imports.
  tags:
    - openapi
    - management
spec:
  type: openapi
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  definition: |
    openapi: 3.0.3
    info:
      title: APIM Simulator Management API
      version: 0.4.0
      description: Local management plane exposed by the APIM simulator.
    servers:
      - url: http://localhost:8000
        description: Default local management endpoint
    paths:
      /apim/management/service:
        get:
          summary: Read service-level APIM resource projection
          responses:
            '200':
              description: Service metadata and resource counts
      /apim/management/apis:
        get:
          summary: List APIs
          responses:
            '200':
              description: API collection
        post:
          summary: Create or import an API
          responses:
            '200':
              description: Created API
      /apim/management/products:
        get:
          summary: List products
          responses:
            '200':
              description: Product collection
        post:
          summary: Create a product
          responses:
            '200':
              description: Created product
      /apim/management/subscriptions:
        get:
          summary: List subscriptions
          responses:
            '200':
              description: Subscription collection
        post:
          summary: Create a subscription
          responses:
            '200':
              description: Created subscription
      /apim/management/named-values:
        get:
          summary: List named values
          responses:
            '200':
              description: Named value collection
