apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: langfuse-demos-runtime
  namespace: dev
  labels:
    app.kubernetes.io/name: langfuse-demos
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: langfuse-demos
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sso
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: langfuse
          podSelector:
            matchLabels:
              app.kubernetes.io/name: langfuse
              app.kubernetes.io/component: web
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
      ports:
        - protocol: TCP
          port: 80
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp
          podSelector:
            matchLabels:
              app.kubernetes.io/name: platform-mcp
      ports:
        - protocol: TCP
          port: 8080
