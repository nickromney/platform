<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APIM Simulator</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@social-5h3ll/5h3ll-ui@0.1.4/dist/5h3ll_ui.cdn.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@social-5h3ll/5h3ll-ui@0.1.4/dist/js/all.min.js" defer></script>
    <link rel="stylesheet" href="/app-shell.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
      <div>
        <h1>APIM Simulator</h1>
        <p>Go gateway, vanilla console, APIM-shaped routing and tracing.</p>
      </div>
      <div class="header-actions">
        <p id="auth-state" class="auth-state">Not signed in.</p>
        <button id="logout-btn" class="sign-in-link" type="button" hidden>Sign Out</button>
        <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system"></button>
      </div>
    </header>
    <main id="main" tabindex="-1">
      <section id="status" class="app-panel notice" role="status" aria-live="polite">Connect to load the gateway surface.</section>
      <form id="connection-form" class="app-panel">
        <label for="tenant-key">Tenant Key</label>
        <div class="form-row">
          <input id="tenant-key" name="tenant_key" type="password" value="local-dev-tenant-key">
          <button type="submit">Connect</button>
        </div>
      </form>
      <section class="app-panel metrics">
        <article><strong id="metric-apis">0</strong><span>APIs</span></article>
        <article><strong id="metric-routes">0</strong><span>Routes</span></article>
        <article><strong id="metric-products">0</strong><span>Products</span></article>
        <article><strong id="metric-subscriptions">0</strong><span>Subscriptions</span></article>
      </section>
      <section class="app-panel grid">
        <div>
          <h2>Routes</h2>
          <ul id="routes"></ul>
        </div>
        <div>
          <h2>Subscriptions</h2>
          <ul id="subscriptions"></ul>
        </div>
      </section>
      <section class="app-panel">
        <h2>Replay</h2>
        <form id="replay-form" class="replay">
          <label for="method">HTTP method</label>
          <select id="method" name="method"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
          <label for="path">Request path</label>
          <input id="path" name="path" value="/api/health">
          <label for="headers">Request headers</label>
          <textarea id="headers" name="headers">{ "x-apim-trace": "true" }</textarea>
          <label for="body">Request body</label>
          <textarea id="body" name="body" placeholder="Body"></textarea>
          <button type="submit">Run</button>
        </form>
        <pre id="replay-result"></pre>
      </section>
      <section class="app-panel">
        <h2>Traces</h2>
        <button id="refresh-traces" type="button">Refresh traces</button>
        <pre id="traces"></pre>
      </section>
    </main>
    <script src="/idpauth.js"></script>
    <script src="/app-shell.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
