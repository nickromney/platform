<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPv4 Subnet Calculator</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>IPv4 Subnet Calculator</h1>
          <p>Vanilla HTML, CSS, JavaScript, and a Go API.</p>
        </div>
        <div class="header-actions">
          <p id="auth-state" class="auth-state">Not signed in.</p>
          <button id="login-btn" type="button" hidden>Sign In</button>
          <button id="logout-btn" type="button" hidden>Sign Out</button>
          <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system">
            <svg data-theme-icon="system" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="12" rx="2"></rect>
              <path d="M8 20h8"></path>
              <path d="M12 16v4"></path>
            </svg>
            <svg data-theme-icon="light" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg data-theme-icon="dark" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 14.5A8 8 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section id="api-status" class="notice">Checking API...</section>

      <form id="lookup-form">
        <label for="ip-address">IP Address or CIDR Range</label>
        <div class="form-row">
          <input id="ip-address" name="address" placeholder="e.g., 192.168.1.1 or 10.0.0.0/24" required>
          <select id="cloud-mode" name="mode">
            <option value="Standard">Standard</option>
            <option value="AWS">AWS</option>
            <option value="Azure" selected>Azure</option>
            <option value="OCI">OCI</option>
          </select>
          <button id="lookup-btn" type="submit">Lookup</button>
        </div>
        <div class="examples" aria-label="Examples">
          <button type="button" data-example="10.0.0.0/24">RFC1918: 10.0.0.0/24</button>
          <button type="button" data-example="100.64.0.1">RFC6598: 100.64.0.1</button>
          <button type="button" data-example="8.8.8.8">Public: 8.8.8.8</button>
          <button type="button" data-example="104.16.1.1">Cloudflare: 104.16.1.1</button>
          <button type="button" data-example="192.168.1.0/24">Network: 192.168.1.0/24</button>
        </div>
      </form>

      <form id="provider-form">
        <h2>Provider Range Check</h2>
        <label for="provider-address">Address</label>
        <div class="form-row">
          <input id="provider-address" name="address" placeholder="e.g., 3.5.140.1 or 104.16.1.1" required>
          <select id="provider-name" name="provider">
            <option value="cloudflare">Cloudflare</option>
            <option value="aws">AWS</option>
            <option value="azure">Azure</option>
            <option value="stripe">Stripe</option>
            <option value="openai">OpenAI</option>
          </select>
          <button id="provider-btn" type="submit">Check</button>
        </div>
      </form>

      <section id="auth-panel">
        <h2>Identity</h2>
        <form id="identity-form">
          <input id="token-input" name="token" type="password" autocomplete="off" placeholder="Paste bearer token">
          <div class="auth-actions">
            <button id="whoami-btn" type="submit">Validate Token</button>
          </div>
        </form>
      </section>

      <section id="results" tabindex="-1" aria-live="polite" hidden>
        <h2>Results</h2>
        <div id="results-content"></div>
      </section>
    </main>
    <script src="/runtime-config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
