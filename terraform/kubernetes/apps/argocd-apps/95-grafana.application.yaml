                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 34}, "id": 103, "options": {"content": "## TCP & DNS Metrics\nTCP connection tracking and DNS query rates from Hubble.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 36}, "id": 40, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_tcp_flags_total[5m])) by (flag, family)", "legendFormat": "{{flag}} ({{family}})", "refId": "A"}], "title": "TCP Flags Rate", "type": "timeseries"},
                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 36}, "id": 41, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_dns_queries_total[5m])) by (rcode)", "legendFormat": "rcode={{rcode}}", "refId": "A"}], "title": "DNS Query Rate by Response Code", "type": "timeseries"},

                    {"gridPos": {"h": 2, "w": 24, "x": 0, "y": 44}, "id": 104, "options": {"content": "## Policy Verdict Breakdown\nHubble policy verdict metrics showing allowed vs denied traffic per namespace.", "mode": "markdown"}, "title": "", "type": "text", "transparent": true},
