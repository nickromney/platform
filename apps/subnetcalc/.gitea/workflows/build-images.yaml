name: Build subnet-calculator images

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "shared/**"
      - "update-subnetcalc-image-tags.sh"
      - ".gitea/workflows/**"
  workflow_dispatch:

env:
  WORKDIR: /tmp/subnet-calculator
  APP_REPO_NAME: subnetcalc

jobs:
  build:
    runs-on: [self-hosted, in-cluster]
    defaults:
      run:
        shell: sh
    steps:
      - name: Clone repo
        run: |
          set -e
          : "${GITEA_HTTP_BASE:?}"
          : "${GITEA_REPO_OWNER:?}"
          : "${REGISTRY_USERNAME:?}"
          : "${REGISTRY_PWD:?}"

          rm -rf "${WORKDIR}"
          git config --global credential.helper store

          host="$(echo "${GITEA_HTTP_BASE}" | sed -E 's#^https?://##')"
          proto="$(echo "${GITEA_HTTP_BASE}" | sed -E 's#^(https?)://.*#\1#')"
          printf "protocol=%s\nhost=%s\nusername=%s\npassword=%s\n" \
            "${proto}" "${host}" "${REGISTRY_USERNAME}" "${REGISTRY_PWD}" \
            | git credential-store store

          git clone "${GITEA_HTTP_BASE}/${GITEA_REPO_OWNER}/${APP_REPO_NAME}.git" "${WORKDIR}"
          cd "${WORKDIR}" && git checkout main

      - name: Log in to registry
        run: |
          set -e
          : "${REGISTRY_HOST:?}"
          echo "${REGISTRY_PWD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build and push runtime images
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          cat > Dockerfile.runtime <<'EOF_DOCKERFILE'
          FROM dhi.io/golang:1.26-alpine3.23-dev AS build
          WORKDIR /src
          COPY app/go.mod app/go.sum ./
          COPY shared /shared
          RUN go mod download
          COPY app/ ./
          RUN CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /out/subnetcalc ./cmd/subnetcalc

          FROM dhi.io/static:20260413-alpine3.23
          COPY --from=build /out/subnetcalc /subnetcalc
          USER 65532:65532
          ENV PORT=8080
          EXPOSE 8080
          ENTRYPOINT ["/subnetcalc"]
          EOF_DOCKERFILE

          docker build --provenance=false -f Dockerfile.runtime -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:${TAG}" .
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:latest"
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend:${TAG}"
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend:latest"

          DOCKER_BUILDKIT=1 docker build --provenance=false -f apim-simulator/Dockerfile -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}" apim-simulator
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:latest"

      - name: Stamp manifests with new subnetcalc tags
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          export TAG
          bash update-subnetcalc-image-tags.sh
