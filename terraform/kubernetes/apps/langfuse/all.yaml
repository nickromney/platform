apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-minio
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-minio
    app.kubernetes.io/component: minio
spec:
  serviceName: langfuse-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-minio
        app.kubernetes.io/component: minio
    spec:
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: create-bucket-dir
          image: cgr.dev/chainguard/busybox:latest
          command: ["mkdir", "-p", "/data/langfuse"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: cgr.dev/chainguard/minio:latest
          args:
            - server
            - --address
            - :9000
            - --console-address
            - :9001
            - /data
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-password
          startupProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 384Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-minio
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-minio
    app.kubernetes.io/component: minio
spec:
  selector:
    app.kubernetes.io/name: langfuse-minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
        app.kubernetes.io/component: web
        project: kindlocal
        team: platform
        tier: platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: docker.io/langfuse/langfuse:3
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: langfuse-env
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: database-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: nextauth-secret
            - name: AUTH_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-keycloak-oidc
                  key: client-secret
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: salt
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: encryption-key
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: clickhouse-password
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: redis-auth
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-password
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-password
            - name: LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-password
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: init-user-password
            - name: HOME
              value: /tmp
            - name: NODE_OPTIONS
              value: --max-old-space-size=768
          startupProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
