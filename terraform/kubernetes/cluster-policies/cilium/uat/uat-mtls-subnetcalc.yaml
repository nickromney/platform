apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: uat-subnetcalc-router-ingress
spec:
  description: >-
    Allow only SSO reverse-proxies to reach the subnetcalc router in uat.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:app.kubernetes.io/name": subnetcalc-router
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sso
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: uat-subnetcalc-frontend-ingress
spec:
  description: >-
    Allow only the subnetcalc router to reach the subnetcalc frontend in uat.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
      "k8s:app.kubernetes.io/name": subnetcalc-frontend
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": uat
            "k8s:app.kubernetes.io/name": subnetcalc-router
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
