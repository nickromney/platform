x-python-build-args: &python-build-args
  PYTHON_BUILD_IMAGE: ${PYTHON_BUILD_IMAGE:-dhi.io/python:3.13-debian13-dev}
  PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-dhi.io/python:3.13-debian13}
  APP_UID: ${APP_UID:-65532}
  APP_GID: ${APP_GID:-65532}

x-python-service-hardening: &python-service-hardening
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-ai-mock-healthcheck: &ai-mock-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
    ]
  interval: 10s
  timeout: 3s
  retries: 10
  start_period: 5s

services:
  ai-openai-primary:
    <<: *python-service-hardening
    build:
      context: ./examples/ai-gateway/mock-openai-backend
      dockerfile: Dockerfile
      args:
        PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-dhi.io/python:3.13-debian13}
        APP_UID: ${APP_UID:-65532}
        APP_GID: ${APP_GID:-65532}
    image: apim-simulator-ai-openai-mock:latest
    expose:
      - "8080"
    environment:
      AI_MOCK_BACKEND_ID: local-primary
      AI_MOCK_REGION: local-eu
      AI_MOCK_DEPLOYMENTS: gpt-4o-mini,text-embedding-3-small
      AI_MOCK_TOKEN_LIMIT: "512"
      OTEL_SERVICE_NAME: ai-openai-primary
    healthcheck: *ai-mock-healthcheck
    networks:
      - apim

  ai-openai-secondary:
    <<: *python-service-hardening
    image: apim-simulator-ai-openai-mock:latest
    build:
      context: ./examples/ai-gateway/mock-openai-backend
      dockerfile: Dockerfile
      args:
        PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-dhi.io/python:3.13-debian13}
        APP_UID: ${APP_UID:-65532}
        APP_GID: ${APP_GID:-65532}
    expose:
      - "8080"
    environment:
      AI_MOCK_BACKEND_ID: local-secondary
      AI_MOCK_REGION: local-us
      AI_MOCK_DEPLOYMENTS: gpt-4o-mini,text-embedding-3-small
      AI_MOCK_TOKEN_LIMIT: "512"
      OTEL_SERVICE_NAME: ai-openai-secondary
    healthcheck: *ai-mock-healthcheck
    networks:
      - apim

  apim-simulator:
    environment:
      APIM_CONFIG_PATH: /tmp/ai-gateway-apim-config.json
      APIM_CONFIG_SOURCE_PATH: /app/examples/ai-gateway/apim.json
      OTEL_SERVICE_NAME: apim-simulator
    depends_on:
      ai-openai-primary:
        condition: service_healthy
      ai-openai-secondary:
        condition: service_healthy

networks:
  apim:
