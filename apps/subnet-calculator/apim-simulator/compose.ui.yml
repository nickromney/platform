x-ui-nginx-hardening: &ui-nginx-hardening
  init: true
  read_only: true
  user: "${NGINX_UID:-101}:${NGINX_GID:-101}"
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=1777
    - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
    - /var/run:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  ui:
    <<: *ui-nginx-hardening
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        UI_BUILD_IMAGE: ${UI_BUILD_IMAGE:-node:22-alpine}
        NGINX_RUNTIME_IMAGE: ${NGINX_RUNTIME_IMAGE:-dhi.io/nginx:1.29.5-debian13}
        NGINX_UID: ${NGINX_UID:-101}
        NGINX_GID: ${NGINX_GID:-101}
    image: apim-simulator-ui:latest
    depends_on:
      apim-simulator:
        condition: service_started
    ports:
      - "3007:8080"
