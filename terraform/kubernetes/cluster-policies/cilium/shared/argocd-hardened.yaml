apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: argocd-hardened
spec:
  description: >-
    Hardened policy for argocd namespace. ArgoCD is highly privileged (cluster admin).
    Ingress: only from shared auth proxies, platform-gateway admin UI access,
    observability scrapes, and intra-namespace.
    Egress: kube-apiserver (deployments), Gitea SSH (repo sync), shared Dex
    (OIDC), and DNS. External Helm chart egress is delegated to a
    workload-scoped repo-server policy.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": argocd
  ingress:
    - fromEntities:
        - host
        - remote-node
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": argocd
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/component": authentication-proxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8083"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": platform-gateway
            "k8s:app.kubernetes.io/name": platform-gateway-nginx
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            # argocd-application-controller metrics
            - port: "8082"
              protocol: TCP
            # argocd-notifications metrics
            - port: "8083"
              protocol: TCP
            # argocd-server metrics
            - port: "8084"
              protocol: TCP
            # argocd-repo-server metrics
            - port: "8085"
              protocol: TCP
            # argocd-notifications-controller metrics
            - port: "9001"
              protocol: TCP
            # argocd-dex-server telemetry
            - port: "5558"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": argocd
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gitea
      toPorts:
        - ports:
            - port: "22"
              protocol: TCP
            - port: "2222"
              protocol: TCP
            - port: "3000"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
            "k8s:app.kubernetes.io/name": dex
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
            - port: "5558"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: argocd-repo-server-helm-egress
spec:
  description: >-
    Allow only argocd-repo-server to fetch Helm charts from the external
    repository that remains outside the in-cluster Gitea mirror during
    bootstrap: dl.gitea.io. Include a DNS L7 rule so Cilium can observe and
    cache the hostname resolution for this FQDN-pinned destination.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": argocd
      "k8s:app.kubernetes.io/name": argocd-repo-server
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: dl.gitea.io
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
