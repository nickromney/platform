# Inbound gateway - Cloud3 (AWS)
# Proxies to app2 on AWS VPC range (172.31.1.1)

server {
    listen 172.16.12.3:8443 ssl http2;
    listen 10.10.1.60:8443 ssl http2;
    server_name inbound.cloud3.test app2.cloud3.test;

    # Server cert
    ssl_certificate     /etc/pki/server-fullchain.crt;
    ssl_certificate_key /etc/pki/server.key;

    # mTLS - verify client against shared root CA
    ssl_client_certificate /etc/pki/root-ca.crt;
    ssl_verify_client on;

    # Mozilla Modern profile: TLS 1.3 only
    # https://wiki.mozilla.org/Security/Server_Side_TLS#Modern_compatibility
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_prefer_server_ciphers off;

    # HSTS: 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pass client identity to backend
    proxy_set_header X-Client-CN $ssl_client_s_dn;
    proxy_set_header X-Client-Verify $ssl_client_verify;

    location / {
        # Backend on AWS VPC range
        proxy_pass http://172.31.1.1:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Ingress-Cloud cloud3;
    }
}

# HTTP redirect to HTTPS
server {
    listen 172.16.12.3:8080;
    listen 10.10.1.60:8080;
    server_name inbound.cloud3.test app2.cloud3.test;
    return 301 https://$host$request_uri;
}
