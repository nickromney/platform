services:
  chatgpt-sim:
    build:
      context: ./apps/chatgpt-sim
    environment:
      ROLE: shell
      PORT: "8080"
      PUBLIC_BASE_URL: http://localhost:18083
      MCP_URL: http://mcp-server:8080/mcp
      LLM_URL: http://llm:8080/v1/chat/completions
    ports:
      - "18084:8080"
    depends_on:
      - mcp-server
      - llm

  mcp-server:
    build:
      context: ./apps/chatgpt-sim
    environment:
      ROLE: mcp
      PORT: "8080"
      PUBLIC_BASE_URL: http://mcp-server:8080

  llm:
    build:
      context: ./apps/chatgpt-sim
    environment:
      ROLE: llm
      PORT: "8080"
      LLM_MODEL: ${PLATFORM_LLM_MODEL:-go-local-openai-compatible}
