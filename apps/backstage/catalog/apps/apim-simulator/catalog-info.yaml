apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: apim-simulator-local
  title: APIM Simulator
  description: Local Azure API Management simulator for gateway, policy, product, and management API workflows.
spec:
  owner: group:default/apim-simulator-maintainers
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: apim-simulator
  title: APIM Simulator
  description: Config-driven APIM-compatible gateway and management plane for local API platform testing.
  tags:
    - apim
    - gateway
    - local
  annotations:
    backstage.io/source-location: url:https://gitea.admin.127.0.0.1.sslip.io/platform/platform/src/branch/main/apps/apim-simulator/
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=subnetcalc-apim-simulator
  links:
    - url: http://localhost:8000/apim/health
      title: Standalone health
      icon: api
    - url: https://subnetcalc.dev.127.0.0.1.sslip.io/api
      title: Platform gateway
      icon: api
    - url: http://localhost:8000
      title: Local frontend
      icon: dashboard
    - url: https://grafana.admin.127.0.0.1.sslip.io
      title: Grafana
      icon: dashboard
spec:
  type: service
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  providesApis:
    - apim-simulator-gateway-api
    - apim-simulator-management-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: apim-simulator-gateway-api
  title: APIM Simulator Gateway API
  description: Runtime gateway surface that accepts proxied API requests and APIM health checks.
  tags:
    - openapi
    - gateway
spec:
  type: openapi
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  definition: |
    openapi: 3.0.3
    info:
      title: APIM Simulator Gateway API
      version: 0.4.0
      description: Local gateway surface exposed by the APIM simulator.
    servers:
      - url: http://localhost:8000
        description: Default local gateway
    paths:
      /apim/health:
        get:
          summary: Check simulator health
          responses:
            '200':
              description: Gateway health state
      /api/{path}:
        get:
          summary: Proxy a GET request to the configured upstream API
          parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
          responses:
            default:
              description: Upstream response
        post:
          summary: Proxy a POST request to the configured upstream API
          parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
          responses:
            default:
              description: Upstream response
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: apim-simulator-management-api
  title: APIM Simulator Management API
  description: Local APIM management surface for runtime summaries, traces, policies, and subscription-key rotation.
  tags:
    - openapi
    - management
spec:
  type: openapi
  lifecycle: local
  owner: group:default/apim-simulator-maintainers
  system: apim-simulator-local
  definition: |
    openapi: 3.0.3
    info:
      title: APIM Simulator Management API
      version: 0.4.0
      description: Local management plane exposed by the APIM simulator.
    servers:
      - url: http://localhost:8000
        description: Default local management endpoint
    paths:
      /apim/management/service:
        get:
          summary: Read service-level APIM resource projection
          responses:
            '200':
              description: Service metadata and resource counts
      /apim/management/apis:
        get:
          summary: List APIs
          responses:
            '200':
              description: API collection
        post:
          summary: Create or import an API
          responses:
            '200':
              description: Created API
      /apim/management/apis/{id}:
        put:
          summary: Replace an API
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Updated API
        delete:
          summary: Delete an API
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '204':
              description: API deleted
      /apim/management/products:
        get:
          summary: List products
          responses:
            '200':
              description: Product collection
        post:
          summary: Create a product
          responses:
            '200':
              description: Created product
      /apim/management/products/{id}:
        put:
          summary: Replace a product
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Updated product
        delete:
          summary: Delete a product
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '204':
              description: Product deleted
      /apim/management/subscriptions:
        get:
          summary: List subscriptions
          responses:
            '200':
              description: Subscription collection
        post:
          summary: Create a subscription
          responses:
            '200':
              description: Created subscription
      /apim/management/subscriptions/{id}:
        put:
          summary: Replace a subscription
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Updated subscription
        delete:
          summary: Delete a subscription
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '204':
              description: Subscription deleted
      /apim/management/named-values:
        get:
          summary: List named values
          responses:
            '200':
              description: Named value collection
        post:
          summary: Create a named value
          responses:
            '200':
              description: Created named value
      /apim/management/named-values/{id}:
        put:
          summary: Replace a named value
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Updated named value
        delete:
          summary: Delete a named value
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '204':
              description: Named value deleted
      /apim/management/summary:
        get:
          summary: Read configured APIM routes, products, subscriptions, and policies
          responses:
            '200':
              description: Management summary
      /apim/management/traces:
        get:
          summary: List recent gateway traces
          responses:
            '200':
              description: Trace collection
      /apim/management/replay:
        post:
          summary: Replay a captured gateway request
          responses:
            '200':
              description: Replay result
      /apim/management/policies/{scope}/{name}:
        get:
          summary: Read a policy document
          parameters:
            - name: scope
              in: path
              required: true
              schema:
                type: string
            - name: name
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Policy XML
        put:
          summary: Replace a policy document
          parameters:
            - name: scope
              in: path
              required: true
              schema:
                type: string
            - name: name
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Updated policy
      /apim/management/subscriptions/{id}/rotate:
        post:
          summary: Rotate a configured subscription key
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Rotated subscription keys
