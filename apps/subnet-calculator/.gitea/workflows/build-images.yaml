name: Build subnet-calculator images

on:
  push:
    branches: [main]
    paths:
      - "api-fastapi-container-app/**"
      - "apim-simulator/**"
      - "frontend-typescript-vite/**"
      - "frontend-react/**"
      - "shared-frontend/**"
      - "scripts/**"
      - ".gitea/workflows/**"
  workflow_dispatch:

env:
  DOCKER_HOST: unix:///var/run/docker.sock
  WORKDIR: /tmp/subnet-calculator

jobs:
  build:
    runs-on: [self-hosted, in-cluster]
    defaults:
      run:
        shell: sh
    steps:
      - name: Clone repo
        run: |
          set -e
          : "${GITEA_HTTP_BASE:?}"
          : "${GITEA_REPO_OWNER:?}"
          : "${REGISTRY_USERNAME:?}"
          : "${REGISTRY_PWD:?}"

          rm -rf "${WORKDIR}"
          git config --global credential.helper store

          host="$(echo "${GITEA_HTTP_BASE}" | sed -E 's#^https?://##')"
          proto="$(echo "${GITEA_HTTP_BASE}" | sed -E 's#^(https?)://.*#\1#')"
          printf "protocol=%s\nhost=%s\nusername=%s\npassword=%s\n" \
            "${proto}" "${host}" "${REGISTRY_USERNAME}" "${REGISTRY_PWD}" \
            | git credential-store store

          git clone "${GITEA_HTTP_BASE}/${GITEA_REPO_OWNER}/subnet-calculator.git" "${WORKDIR}"
          cd "${WORKDIR}" && git checkout main

      - name: Log in to registry
        run: |
          set -e
          : "${REGISTRY_HOST:?}"
          echo "${REGISTRY_PWD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build and push api-fastapi-container-app
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          docker build --provenance=false -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api-fastapi-container-app:${TAG}" ./api-fastapi-container-app
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api-fastapi-container-app:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api-fastapi-container-app:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api-fastapi-container-app:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-api-fastapi-container-app:latest"

      - name: Build and push apim-simulator
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          docker build --provenance=false -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}" ./apim-simulator
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-apim-simulator:latest"

      - name: Build and push frontend-typescript-vite
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          docker build --provenance=false -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-typescript-vite:${TAG}" -f ./frontend-typescript-vite/Dockerfile .
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-typescript-vite:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-typescript-vite:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-typescript-vite:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-typescript-vite:latest"

      - name: Build and push frontend-react
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          docker build --provenance=false \
            --build-arg VITE_API_PROXY_ENABLED=true \
            --build-arg VITE_AUTH_METHOD=easyauth \
            -t "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-react:${TAG}" \
            -f ./frontend-react/Dockerfile .
          docker tag "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-react:${TAG}" "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-react:latest"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-react:${TAG}"
          docker push "${REGISTRY_HOST}/${GITEA_REPO_OWNER}/subnetcalc-frontend-react:latest"

      - name: Stamp manifests with new subnetcalc tags
        run: |
          set -e
          cd "${WORKDIR}"
          TAG="$(git rev-parse --short=12 HEAD)"
          export TAG
          bash scripts/update-subnetcalc-image-tags.sh
