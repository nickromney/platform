            - name: PORT
              value: "8080"
            - name: RUNTIME_ROLE
              value: "frontend"
            - name: BACKEND_URL
              value: "http://sentiment-api:8080"
            - name: AUTH_METHOD
              value: "gateway"
            - name: API_AUTH_METHOD
              value: "oidc"
            - name: API_BASE_PATH
              value: "/api/v1"
            - name: SHOW_NETWORK_PATH
              value: "true"
            - name: NETWORK_HOPS
              value: '[{"label":"Browser","detail":"sentiment public host","role":"User agent"},{"label":"OAuth2 Proxy","detail":"SSO gate","role":"Session and access-token forwarding"},{"label":"Sentiment router","detail":"dev/uat nginx router","role":"Routes UI and API traffic"},{"label":"Sentiment frontend","detail":"sentiment-auth-ui service","role":"Static UI delivery"},{"label":"APIM simulator","detail":"apim/subnetcalc-apim-simulator","role":"Gateway auth, policy, tracing"},{"label":"Sentiment API","detail":"sentiment-api service","role":"Go backend inference and storage"}]'
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
