# TLS 1.3 experiment overlay for sentiment (Mozilla Modern profile)
#
# Usage:
#   cd pki && ./gen-certs.sh       # one-time: generate local dev certs
#   docker compose -f compose.yml -f compose.tls.yml up
#
# Access:
#   https://localhost:8443  — TLS 1.3 (Mozilla Modern), OAuth2-protected
#   http://localhost:8444   — redirects to HTTPS
#
# Architecture:
#   Browser → tls-proxy:8443 (TLS 1.3) → oauth2-proxy:4180 → edge:8080 → services
#
# The existing HTTP-only stack (compose.yml alone) is unchanged.
services:
  tls-proxy:
    image: dhi.io/nginx:1.29.5-debian13
    ports:
      - "8443:8443"
      - "8444:8080"
    volumes:
      - ./tls-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pki/server-fullchain.crt:/etc/nginx/certs/server-fullchain.crt:ro
      - ./pki/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - oauth2-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:8443/health 2>/dev/null || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
