                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "pps"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18}, "id": 21, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"]}}, "targets": [{"expr": "sum(rate(hubble_flows_processed_total[5m])) by (verdict)", "legendFormat": "{{verdict}}", "refId": "A"}], "title": "Hubble Flow Verdicts (rate)", "type": "timeseries"},

                    {"datasource": {"type": "prometheus", "uid": "${prometheus}"}, "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 26}, "id": 30, "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean"]}}, "targets": [{"expr": "sum(rate(hubble_http_requests_total{destination_namespace=~\"dev|uat|apim\"}[5m])) by (source_workload, destination_workload, method)", "legendFormat": "{{source_workload}}→{{destination_workload}} {{method}}", "refId": "A"}], "title": "HTTP Requests: App Namespaces (source→dest)", "type": "timeseries"},
