# Docker Compose for TypeScript + Vite frontend (standalone)
services:
  frontend-typescript-vite:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    image: subnetcalc-frontend-typescript-vite:latest
    ports:
      - "3000:8080"
    environment:
      - API_BASE_URL=http://localhost:8090
      - AUTH_METHOD=none
