# APIM namespace - shared API management services
apiVersion: v1
kind: Namespace
metadata:
  name: apim
  labels:
    app.kubernetes.io/name: apim
    app.kubernetes.io/component: apim
    "platform.publiccloudexperiments.net/namespace-role": shared

---
# SubnetCalc APIM Simulator Config - Shared (routes based on Host header)
apiVersion: v1
kind: ConfigMap
metadata:
  name: subnetcalc-apim-simulator-config
  namespace: apim
  labels:
    app.kubernetes.io/name: subnetcalc-apim-simulator
    app: subnetcalc
    project: kindlocal
    team: dolphin
    tier: gateway
    role: apim
data:
  config.json: |
    {
      "allowed_origins": ["https://subnetcalc.dev.127.0.0.1.sslip.io", "https://subnetcalc.uat.127.0.0.1.sslip.io", "https://mcp-console.127.0.0.1.sslip.io"],
      "allow_anonymous": false,
      "oidc": {
        "issuer": "https://keycloak.127.0.0.1.sslip.io/realms/platform",
        "audience": "apim-simulator",
        "jwks_uri": "http://keycloak.sso.svc.cluster.local:8080/realms/platform/protocol/openid-connect/certs"
      },
      "subscription": {
        "required": false,
        "bypass": [
          {
            "header": "X-Subnetcalc-Bypass-Subscription",
            "equals": "true"
          }
        ]
      },
      "routes": [
        {
          "name": "subnetcalc-api-dev",
          "host_match": ["subnetcalc.dev.127.0.0.1.sslip.io", "subnetcalc-dev.127.0.0.1.sslip.io"],
          "path_prefix": "/api",
          "upstream_base_url": "http://subnetcalc-api.dev.svc.cluster.local:8000",
          "upstream_path_prefix": "/api"
        },
        {
          "name": "subnetcalc-api-uat",
          "host_match": ["subnetcalc.uat.127.0.0.1.sslip.io", "subnetcalc-uat.127.0.0.1.sslip.io"],
          "path_prefix": "/api",
          "upstream_base_url": "http://subnetcalc-api.uat.svc.cluster.local:8000",
          "upstream_path_prefix": "/api"
        },
        {
          "name": "platform-mcp",
          "host_match": ["mcp.127.0.0.1.sslip.io"],
          "path_prefix": "/mcp",
          "upstream_base_url": "http://platform-mcp.mcp.svc.cluster.local:8080",
          "upstream_path_prefix": "/mcp"
        }
      ]
    }

---
# SubnetCalc APIM Simulator - Shared deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subnetcalc-apim-simulator
  namespace: apim
  labels:
    app.kubernetes.io/name: subnetcalc-apim-simulator
    app.kubernetes.io/component: apim
    app: subnetcalc
    project: kindlocal
    team: dolphin
    tier: gateway
    role: apim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: subnetcalc-apim-simulator
      app.kubernetes.io/component: apim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subnetcalc-apim-simulator
        app.kubernetes.io/component: apim
        app: subnetcalc
        project: kindlocal
        team: dolphin
        tier: gateway
        role: apim
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: gitea-registry-creds
      containers:
        - name: apim
          image: localhost:30090/platform/subnetcalc-apim-simulator:latest
          imagePullPolicy: Always
          env:
            - name: APIM_CONFIG_PATH
              value: /config/config.json
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config/config.json
              subPath: config.json
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /apim/startup
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /apim/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: subnetcalc-apim-simulator-config
        - name: tmp
          emptyDir: {}

---
# Shared service - both dev and uat use this
apiVersion: v1
kind: Service
metadata:
  name: subnetcalc-apim-simulator
  namespace: apim
  labels:
    app.kubernetes.io/name: subnetcalc-apim-simulator
    app.kubernetes.io/component: apim
    app: subnetcalc
    project: kindlocal
    team: dolphin
    tier: gateway
    role: apim
spec:
  selector:
    app.kubernetes.io/name: subnetcalc-apim-simulator
    app.kubernetes.io/component: apim
  ports:
    - name: http
      port: 8000
      targetPort: 8000
