# Compose configuration for sentiment (local equivalent of kind-local demo)
# Works with both docker compose and podman-compose.
#
# The local stack uses the same SST-backed sentiment path as the Kubernetes demo.

x-app-runtime-hardening: &app-runtime-hardening
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,mode=1777

x-nginx-runtime-hardening: &nginx-runtime-hardening
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,uid=65532,gid=65532,mode=1777
    - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532
    - /var/run/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    entrypoint: ["/bin/sh", "/opt/keycloak/local/start-with-templated-realm.sh"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-demo@admin.test}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - KC_DB=dev-file
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - OAUTH2_PROXY_CLIENT_SECRET=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - KEYCLOAK_DEMO_PASSWORD=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
    ports:
      - "8300:8080"
    volumes:
      - ../shared/keycloak/realm-export.json:/opt/keycloak/local/realm-export.template.json:ro
      - ../shared/keycloak/start-with-templated-realm.sh:/opt/keycloak/local/start-with-templated-realm.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      # Keycloak startup can be substantially slower on cold linux/amd64 boots under emulation.
      retries: 30
      start_period: 600s

  sentiment-api:
    <<: *app-runtime-hardening
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      - HOME=/tmp
      - RUNTIME_ROLE=backend
      - AUTH_METHOD=${SENTIMENT_BACKEND_AUTH_METHOD:-none}
      - OIDC_ISSUER_URL=${SENTIMENT_OIDC_ISSUER_URL:-http://localhost:8300/realms/platform}
      - OIDC_AUDIENCE=${SENTIMENT_OIDC_AUDIENCE:-sentiment-api}
      - OIDC_JWKS_URI=${SENTIMENT_OIDC_JWKS_URI:-http://keycloak:8080/realms/platform/protocol/openid-connect/certs}
      - PORT=8080
      - DATA_DIR=/data
      - CSV_PATH=/data/comments.csv
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/sentiment", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  sentiment-auth-frontend:
    <<: *app-runtime-hardening
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      - HOME=/tmp
      - RUNTIME_ROLE=frontend
      - BACKEND_URL=${SENTIMENT_FRONTEND_BACKEND_URL:-http://sentiment-api:8080}
      - API_BASE_PATH=/api/v1
      - AUTH_METHOD=${SENTIMENT_FRONTEND_AUTH_METHOD:-none}
      - API_AUTH_METHOD=${SENTIMENT_FRONTEND_API_AUTH_METHOD:-none}
      - SHOW_NETWORK_PATH=${SENTIMENT_SHOW_NETWORK_PATH:-true}
      - 'NETWORK_HOPS=[{"label":"Browser","detail":"localhost","role":"User agent"},{"label":"Sentiment edge","detail":"edge nginx","role":"Routes UI and API traffic"},{"label":"Sentiment frontend","detail":"sentiment-auth-frontend:8080","role":"Static UI and same-origin API proxy"},{"label":"Sentiment API","detail":"sentiment-api:8080","role":"Go backend inference and storage"}]'
      - PORT=8080
    expose:
      - "8080"
    depends_on:
      sentiment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/sentiment", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  edge:
    <<: *nginx-runtime-hardening
    image: dhi.io/nginx:1.29.5-debian13
    user: "65532:65532"
    volumes:
      - ./edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    depends_on:
      sentiment-api:
        condition: service_healthy
      sentiment-auth-frontend:
        condition: service_healthy

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
    restart: unless-stopped
    ports:
      - "8304:4180"
    environment:
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:?Set OAUTH2_PROXY_COOKIE_SECRET in the repo .env or export it before running docker compose}
    command:
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=http://localhost:8300/realms/platform
      - --login-url=http://localhost:8300/realms/platform/protocol/openid-connect/auth?max_age=0
      - --redeem-url=http://keycloak:8080/realms/platform/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/platform/protocol/openid-connect/certs
      - --validate-url=http://keycloak:8080/realms/platform/protocol/openid-connect/userinfo
      - --client-id=oauth2-proxy
      - --client-secret=${PLATFORM_DEMO_PASSWORD:?Set PLATFORM_DEMO_PASSWORD in the repo .env or export it before running docker compose}
      - --redirect-url=http://localhost:8304/oauth2/callback
      - --code-challenge-method=S256
      - --upstream=http://edge:8080
      - --http-address=0.0.0.0:4180
      - --cookie-secure=false
      - --cookie-httponly=true
      - --cookie-expire=4h
      - --cookie-refresh=1h
      - --email-domain=*
      - --scope=openid email profile
      - --oidc-groups-claim=groups
      - --allowed-group=app-sentiment-dev
      - --allowed-group=platform-admins
      - --pass-access-token=true
      - --pass-user-headers=true
      - --set-authorization-header=true
      - --set-xauthrequest=true
      - --standard-logging=true
      - --auth-logging=true
      - --request-logging=true
      - --upstream-timeout=180s
      - --skip-auth-regex=^/(signed-out\.html|style\.css|app-shell\.css|favicon\.svg|favicon\.ico)$
      - --reverse-proxy=true
      - --skip-provider-button=true
    depends_on:
      - keycloak
      - edge
