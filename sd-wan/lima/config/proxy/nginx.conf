# Nginx reverse proxy for SD-WAN demo
# Routes requests to different "clouds" based on Host header

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    keepalive_timeout 65;
    
    # System 1 (On-Prem)
    upstream system1 {
        server app-system1:8080;
    }
    
    # System 2 (AWS)
    upstream system2 {
        server app-system2:8080;
    }
    
    # System 3 (Azure)
    upstream system3 {
        server app-system3:8080;
    }
    
    server {
        listen 8080;
        server_name localhost;
        
        # Default - show index
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        
        # Route to System 1
        location /system1/ {
            proxy_pass http://system1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Source-System system1;
        }
        
        # Route to System 2
        location /system2/ {
            proxy_pass http://system2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Source-System system2;
        }
        
        # Route to System 3
        location /system3/ {
            proxy_pass http://system3/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Source-System system3;
        }
    }
}
