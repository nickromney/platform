x-python-build-args: &python-build-args
  PYTHON_BUILD_IMAGE: ${PYTHON_BUILD_IMAGE:-dhi.io/python:3.13-debian13-dev}
  PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-dhi.io/python:3.13-debian13}
  APP_UID: ${APP_UID:-65532}
  APP_GID: ${APP_GID:-65532}

x-python-service-hardening: &python-service-hardening
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  mcp-server:
    <<: *python-service-hardening
    build:
      context: ./examples/mcp-server
      dockerfile: Dockerfile
      args: *python-build-args
    image: apim-simulator-mcp-server:latest
    expose:
      - "8080"
    networks:
      - apim

  apim-simulator:
    environment:
      APIM_CONFIG_PATH: /tmp/mcp-apim-config.json
      APIM_CONFIG_SOURCE_PATH: /app/examples/mcp/http.json
    depends_on:
      mock-backend:
        condition: service_started
      mcp-server:
        condition: service_started
