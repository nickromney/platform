apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}-backend
  labels:
    app.kubernetes.io/name: ${{ values.name }}-backend
    app.kubernetes.io/component: backend
    app: ${{ values.name }}
    project: kindlocal
    team: ${{ values.team }}
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${{ values.name }}-backend
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.name }}-backend
        app.kubernetes.io/component: backend
        app: ${{ values.name }}
        project: kindlocal
        team: ${{ values.team }}
        tier: backend
    spec:
      imagePullSecrets:
        - name: gitea-registry-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: localhost:30090/platform/${{ values.name }}-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: ${{ values.backendPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}-backend
  labels:
    app.kubernetes.io/name: ${{ values.name }}-backend
    app.kubernetes.io/component: backend
    app: ${{ values.name }}
    project: kindlocal
    team: ${{ values.team }}
    tier: backend
spec:
  selector:
    app.kubernetes.io/name: ${{ values.name }}-backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      appProtocol: http
      port: ${{ values.backendPort }}
      targetPort: http
