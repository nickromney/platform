apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: shared-cluster-policies
policies:
  - audit-platform-runtime-baseline.yaml
  - audit-platform-workload-labels.yaml
  - namespace-default-deny.yaml
  - protect-default-deny.yaml
  - require-app-labels-application-namespaces.yaml
  - restrict-image-registries.yaml
resources:
  - test-audit-platform-runtime-baseline-resources.yaml
  - test-audit-platform-workload-labels-resources.yaml
  - test-namespace-default-deny-resources.yaml
  - test-protect-default-deny-resources.yaml
  - test-require-app-labels-resources.yaml
  - test-restrict-image-registries-resources.yaml
variables: test-values.yaml
results:
  - policy: audit-platform-runtime-baseline
    rule: require-drop-all-capabilities
    resources:
      - hardened-platform-pod
    kind: Pod
    result: pass
  - policy: audit-platform-runtime-baseline
    rule: require-drop-all-capabilities
    resources:
      - soft-platform-pod
    kind: Pod
    result: fail
  - policy: audit-platform-runtime-baseline
    rule: deny-privileged
    resources:
      - hardened-platform-pod
    kind: Pod
    result: pass
  - policy: audit-platform-runtime-baseline
    rule: deny-privileged
    resources:
      - privileged-platform-pod
    kind: Pod
    result: fail
  - policy: audit-platform-runtime-baseline
    rule: deny-privilege-escalation
    resources:
      - hardened-platform-pod
    kind: Pod
    result: pass
  - policy: audit-platform-runtime-baseline
    rule: deny-privilege-escalation
    resources:
      - soft-platform-pod
    kind: Pod
    result: fail
  - policy: audit-platform-runtime-baseline
    rule: require-read-only-root-filesystem
    resources:
      - hardened-platform-pod
    kind: Pod
    result: pass
  - policy: audit-platform-runtime-baseline
    rule: require-read-only-root-filesystem
    resources:
      - soft-platform-pod
    kind: Pod
    result: fail
  - policy: audit-platform-runtime-baseline
    rule: require-runtime-default-seccomp
    resources:
      - hardened-platform-pod
    kind: Pod
    result: pass
  - policy: audit-platform-runtime-baseline
    rule: require-runtime-default-seccomp
    resources:
      - soft-platform-pod
    kind: Pod
    result: fail
  - policy: audit-platform-workload-labels
    rule: require-platform-discovery-labels
    resources:
      - labeled-platform-workload
    kind: Deployment
    result: pass
  - policy: audit-platform-workload-labels
    rule: require-platform-discovery-labels
    resources:
      - unlabeled-platform-workload
    kind: Deployment
    result: fail
  - policy: default-deny-namespaces
    rule: add-default-deny-netpol
    resources:
      - isolated-demo
    kind: Namespace
    generatedResource: test-generated-default-deny.yaml
    result: pass
  - policy: protect-default-deny-netpol
    rule: block-delete-default-deny-netpol
    resources:
      - default-deny
    kind: NetworkPolicy
    result: fail
  - policy: require-app-labels-application-namespaces
    rule: require-app-boundary-labels
    resources:
      - good-app
    kind: Deployment
    result: pass
  - policy: require-app-labels-application-namespaces
    rule: require-app-boundary-labels
    resources:
      - bad-app
    kind: Deployment
    result: fail
  - policy: restrict-image-registries
    rule: validate-image-source
    resources:
      - allowed-image
    kind: Pod
    result: pass
  - policy: restrict-image-registries
    rule: validate-image-source
    resources:
      - blocked-image
    kind: Pod
    result: fail
