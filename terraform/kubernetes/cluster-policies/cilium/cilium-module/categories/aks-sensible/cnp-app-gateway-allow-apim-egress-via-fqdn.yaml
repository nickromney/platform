metadata:
  name: cnp-app-gateway-allow-apim-egress-via-fqdn
  annotations:
    policies.cilium.io/title: App gateway allow APIM egress
    platform.publiccloudexperiments.net/source-kind: CiliumNetworkPolicy
specs:
  - description: End-user app egress policy. Allows gateway pods to reach Azure API Management gateway endpoints that use the default azure-api.net hostname pattern. Carries its own DNS proxy rule so hostname enforcement does not depend on another policy.
    endpointSelector:
      matchExpressions:
        - key: k8s:project
          operator: Exists
        - key: k8s:team
          operator: Exists
        - key: k8s:app
          operator: Exists
        - key: k8s:tier
          operator: In
          values:
            - gateway
        - key: k8s:app.kubernetes.io/name
          operator: Exists
    egress:
      - toEndpoints:
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: kube-system
              k8s:k8s-app: kube-dns
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: kube-system
              k8s:app.kubernetes.io/name: coredns
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: '*'
      - toFQDNs:
          - matchPattern: '*.azure-api.net'
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
