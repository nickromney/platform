    team: dolphin
    tier: frontend
    role: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentiment-auth-ui
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentiment-auth-ui
        app.kubernetes.io/component: frontend
        app: sentiment
        project: kindlocal
        team: dolphin
        tier: frontend
        role: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: gitea-registry-creds
      containers:
        - name: ui
          image: localhost:30090/platform/sentiment-auth-ui:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run/nginx
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-auth-ui
  labels:
    app.kubernetes.io/name: sentiment-auth-ui
    app.kubernetes.io/component: frontend
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: frontend
    role: frontend
spec:
  selector:
    app.kubernetes.io/name: sentiment-auth-ui
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentiment-router-nginx
  labels:
    app.kubernetes.io/name: sentiment-router
    app: sentiment
    project: kindlocal
    team: dolphin
    tier: gateway
    role: gateway
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      location ^~ /api/ {
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        send_timeout 180s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-api:8080;
      }

      location = /api {
        return 301 /api/;
      }

      location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sentiment-auth-ui:8080;
      }
    }

