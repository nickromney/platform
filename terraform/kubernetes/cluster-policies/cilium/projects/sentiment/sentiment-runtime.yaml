---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sentiment-api-egress
spec:
  description: >-
    Allow the sentiment API to emit OTEL data and reach LiteLLM when the
    in-cluster broker mode is selected.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment-llm
      "k8s:tier": backend
      "k8s:app.kubernetes.io/name": sentiment-api
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            "k8s:app.kubernetes.io/name": otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": sentiment-llm
            "k8s:role": llm
            "k8s:app.kubernetes.io/name": litellm
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sentiment-litellm-ingress-egress
spec:
  description: >-
    Allow LiteLLM to receive traffic from the sentiment API and talk to
    llama.cpp only.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": sentiment-llm
      "k8s:role": llm
      "k8s:app.kubernetes.io/name": litellm
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": sentiment-llm
            "k8s:tier": backend
            "k8s:app.kubernetes.io/name": sentiment-api
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": sentiment-llm
            "k8s:role": llm
            "k8s:app.kubernetes.io/name": llama-cpp
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
