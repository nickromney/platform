services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    init: true
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: demo@admin.test
      KC_BOOTSTRAP_ADMIN_PASSWORD: demo-password
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    # start-dev rebuilds Quarkus artifacts, so the image cannot run read-only
    # without switching to a custom optimized image.
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=1000,gid=0,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./examples/subnet-calculator/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 240s
    networks:
      - apim

  apim-simulator:
    environment:
      APIM_CONFIG_PATH: /tmp/oidc-apim-config.json
      APIM_CONFIG_SOURCE_PATH: /app/examples/oidc/keycloak.json
      OIDC_ISSUER_EXTERNAL: ${OIDC_ISSUER_EXTERNAL:-http://localhost:8180/realms/subnet-calculator}
    depends_on:
      mock-backend:
        condition: service_started
      keycloak:
        condition: service_healthy

networks:
  apim:

volumes:
  keycloak-data:
