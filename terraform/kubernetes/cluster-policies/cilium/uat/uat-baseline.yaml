apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: uat-baseline
spec:
  description: >-
    Baseline for uat namespace. Provides ONLY shared infrastructure access:
    DNS, kube-apiserver, Dex (SSO), OTEL collector, and health-check ingress.
    All intra-namespace and cross-namespace app traffic is delegated to the
    uat-mtls-* role-based policies which enforce strict per-pod access control.
    This separation is critical: Cilium policies are additive (OR logic), so
    a broad "allow all intra-namespace" here would completely undermine the
    role-based restrictions in the mTLS policies.
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": uat
  ingress:
    # Kubelet health probes
    - fromEntities:
        - host
        - remote-node
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # kube-apiserver (for service account token review, etc.)
    - toEntities:
        - kube-apiserver
    - toServices:
        - k8sService:
            namespace: default
            serviceName: kubernetes
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
