server {
  listen 8080;
  server_name _;
  absolute_redirect off;

  # ---------------------------------------------------------------------------
  # Mock Easy Auth endpoints
  #
  # Behavior:
  # - If cookie "easyauth=1" is present: /.auth/me returns a principal with claims
  # - Otherwise: /.auth/me still returns 200 but with an *empty* principal (bug repro)
  # - /.auth/logout clears the cookie and redirects to /logged-out.html
  # ---------------------------------------------------------------------------

  location = /.auth/me {
    default_type application/json;
    add_header Cache-Control "no-store";

    set $user_email "";
    set $user_name "";
    set $access_token_json null;

    if ($cookie_easyauth = "1") { set $user_email "demo@dev.test"; }
    if ($cookie_easyauth = "1") { set $user_name "Demo User"; }
    if ($cookie_easyauth = "1") { set $access_token_json "\"mock-access-token\""; }

    return 200 "[{\"provider_name\":\"mock-easyauth\",\"user_id\":\"$user_email\",\"access_token\":$access_token_json,\"claims\":[{\"typ\":\"name\",\"val\":\"$user_name\"},{\"typ\":\"email\",\"val\":\"$user_email\"},{\"typ\":\"preferred_username\",\"val\":\"$user_email\"}]}]";
  }

  location ~ ^/\.auth/login/ {
    add_header Set-Cookie "easyauth=1; Path=/; HttpOnly; SameSite=Lax";
    return 302 /;
  }

  location = /.auth/logout {
    add_header Set-Cookie "easyauth=0; Path=/; Max-Age=0; HttpOnly; SameSite=Lax";
    return 302 /logged-out.html;
  }

  # ---------------------------------------------------------------------------
  # Mock API endpoints
  # ---------------------------------------------------------------------------

  location = /api/v1/health {
    default_type application/json;
    if ($cookie_easyauth != "1") { return 401; }
    return 200 '{"status":"healthy","service":"mock-api","version":"test"}';
  }

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://frontend-react-easyauth-mock:8080;
  }
}
