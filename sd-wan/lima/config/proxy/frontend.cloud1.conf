# Frontend serving + API proxy to cloud2 via mTLS
server {
    listen 10.10.1.4:8080;
    listen 127.0.0.1:8080;
    server_name app1.cloud1.test localhost;

    root /var/www/frontend;
    index index.html;

    # SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to cloud2 inbound gateway via mTLS
    location /api/ {
        proxy_pass https://172.16.11.2;
        proxy_ssl_certificate /etc/pki/client.crt;
        proxy_ssl_certificate_key /etc/pki/client.key;
        proxy_ssl_trusted_certificate /etc/pki/root-ca.crt;
        proxy_ssl_verify on;
        proxy_ssl_server_name on;
        proxy_ssl_name api1.vanity.test;

        proxy_set_header Host api1.vanity.test;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Local cloud1 diagnostics from cloud1's own resolver and WireGuard viewpoint
    location /cloud1-diagnostics/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
