services:
  subnetcalc-backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: subnetcalc-go:latest
    platform: ${SUBNETCALC_LOCAL_PLATFORM:-linux/amd64}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    ports:
      - "8090:8080"
    environment:
      RUNTIME_ROLE: backend
      AUTH_METHOD: ${SUBNETCALC_BACKEND_AUTH_METHOD:-none}
      OIDC_ISSUER_URL: ${SUBNETCALC_OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${SUBNETCALC_OIDC_AUDIENCE:-api-app}
      OIDC_JWKS_URI: ${SUBNETCALC_OIDC_JWKS_URI:-}
      PORT: "8080"
      HOME: /tmp
    healthcheck:
      test: ["CMD", "/subnetcalc", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  subnetcalc-frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: subnetcalc-go:latest
    platform: ${SUBNETCALC_LOCAL_PLATFORM:-linux/amd64}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    ports:
      - "8003:8080"
    environment:
      RUNTIME_ROLE: frontend
      BACKEND_URL: http://subnetcalc-backend:8080
      AUTH_METHOD: ${SUBNETCALC_FRONTEND_AUTH_METHOD:-none}
      API_AUTH_METHOD: ${SUBNETCALC_BACKEND_AUTH_METHOD:-none}
      OIDC_ISSUER_URL: ${SUBNETCALC_OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${SUBNETCALC_OIDC_AUDIENCE:-api-app}
      OIDC_JWKS_URI: ${SUBNETCALC_OIDC_JWKS_URI:-}
      OIDC_CLIENT_ID: ${SUBNETCALC_OIDC_CLIENT_ID:-frontend-app}
      OIDC_REDIRECT_URI: ${SUBNETCALC_OIDC_REDIRECT_URI:-http://localhost:8003/}
      SHOW_NETWORK_PATH: ${SUBNETCALC_SHOW_NETWORK_PATH:-true}
      NETWORK_HOPS: ${SUBNETCALC_NETWORK_HOPS:-}
      PORT: "8080"
      HOME: /tmp
    depends_on:
      subnetcalc-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/subnetcalc", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s
