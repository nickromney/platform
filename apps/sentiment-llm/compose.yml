# Compose configuration for sentiment-llm (local equivalent of kind-local demo)
# Works with both docker compose and podman-compose.
#
# By default the local stack now uses a hardened LiteLLM proxy in front of a
# tiny in-container llama.cpp server for portability. To switch back to a direct
# OpenAI-compatible
# host endpoint (Docker Model Runner, LM Studio, etc.), set:
#   LLM_GATEWAY_MODE=direct
#   LLM_BACKEND_BASE_URL=http://host.docker.internal:12434
#
# If you want LiteLLM to broker to a host endpoint instead of llama.cpp, keep
#   LLM_GATEWAY_MODE=litellm
# and override:
#   LITELLM_UPSTREAM_MODEL=openai/<your-model-id>
#   LITELLM_UPSTREAM_API_BASE=http://host.docker.internal:12434/v1
#   LITELLM_UPSTREAM_API_KEY=dummy
# For Docker Model Runner, you may need:
#   docker desktop enable model-runner --tcp=12434

services:
  llama-cpp:
    build:
      context: ./llama-cpp
      dockerfile: Dockerfile
      args:
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-2b10b6267}
    image: platform/llama-cpp:latest
    volumes:
      - llama-cache:/models-cache
    environment:
      - LLAMA_CACHE=/models-cache
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_ALIAS=${LLAMA_CPP_ALIAS:-local-classifier}
      - LLAMA_ARG_CTX_SIZE=${LLAMA_CPP_CTX_SIZE:-2048}
      - LLAMA_ARG_HF_REPO=${LLAMA_CPP_HF_REPO:-bartowski/SmolLM2-1.7B-Instruct-GGUF}
      - LLAMA_ARG_HF_FILE=${LLAMA_CPP_HF_FILE:-SmolLM2-1.7B-Instruct-Q4_K_M.gguf}
    restart: unless-stopped

  litellm:
    image: dhi.io/litellm:1.81.12-debian13
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LITELLM_UPSTREAM_MODEL=${LITELLM_UPSTREAM_MODEL:-openai/local-classifier}
      - LITELLM_UPSTREAM_API_BASE=${LITELLM_UPSTREAM_API_BASE:-http://llama-cpp:8080/v1}
      - LITELLM_UPSTREAM_API_KEY=${LITELLM_UPSTREAM_API_KEY:-dummy}
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      - llama-cpp

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    entrypoint: ["/bin/sh", "/opt/keycloak/local/start-with-templated-realm.sh"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-ChangeMe123!}
      - KC_DB=dev-file
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-ChangeMe123!}
      - KEYCLOAK_DEMO_PASSWORD=${KEYCLOAK_DEMO_PASSWORD:-ChangeMe123!}
    ports:
      - "8300:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/local/realm-export.template.json:ro
      - ./keycloak/start-with-templated-realm.sh:/opt/keycloak/local/start-with-templated-realm.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      # Keycloak can take 2-4 minutes to start on Apple Silicon when running linux/amd64.
      retries: 30
      start_period: 240s

  sentiment-api:
    build:
      context: ./api-sentiment
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_GATEWAY_MODE=${LLM_GATEWAY_MODE:-litellm}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_MODEL_ALIAS=${LITELLM_MODEL_ALIAS:-sentiment-default}
      - LLM_BACKEND_BASE_URL=${LLM_BACKEND_BASE_URL:-http://host.docker.internal:12434}
      - DATA_DIR=/data
      - CSV_PATH=/data/comments.csv
    volumes:
      - ./data:/data
    depends_on:
      - litellm

  sentiment-auth-frontend:
    build:
      context: ./frontend-react-vite/sentiment-auth-ui
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_BASE_URL: http://localhost:8300
    expose:
      - "8080"

  edge:
    image: dhi.io/nginx:1.29.5-debian13
    volumes:
      - ./edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    depends_on:
      - sentiment-api
      - sentiment-auth-frontend

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.2@sha256:121cdc6520a02d7a2ddd181af6dbdc0f11f7d0c0d9353a999a69c3998cbfe37e
    restart: unless-stopped
    ports:
      - "8304:4180"
    environment:
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:-00000000000000000000000000000000}
    command:
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=http://localhost:8300/realms/subnet-calculator
      - --login-url=http://localhost:8300/realms/subnet-calculator/protocol/openid-connect/auth?max_age=0
      - --redeem-url=http://keycloak:8080/realms/subnet-calculator/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/subnet-calculator/protocol/openid-connect/certs
      - --validate-url=http://keycloak:8080/realms/subnet-calculator/protocol/openid-connect/userinfo
      - --client-id=oauth2-proxy
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-ChangeMe123!}
      - --redirect-url=http://localhost:8304/oauth2/callback
      - --code-challenge-method=S256
      - --upstream=http://edge:8080
      - --http-address=0.0.0.0:4180
      - --cookie-secure=false
      - --cookie-httponly=true
      - --cookie-expire=4h
      - --cookie-refresh=1h
      - --email-domain=*
      - --scope=openid
      - --prompt=login
      - --standard-logging=true
      - --auth-logging=true
      - --request-logging=true
      - --upstream-timeout=180s
    depends_on:
      - keycloak
      - edge

volumes:
  llama-cache: {}
