apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-router-http-routes
spec:
  description: >-
    The router never contacts subnetcalc-api directly. API traffic is proxied
    to the APIM simulator which validates the JWT and forwards to the backend.
    All other paths go to the frontend.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": gateway
      "k8s:app.kubernetes.io/name": subnetcalc-router
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health.*"
              - method: "POST"
                path: "/api/v1/ipv4/.*"
              - method: "OPTIONS"
                path: "/api/v1/ipv4/.*"
              - method: "GET"
                path: "/api/v1/subnet.*"
              - method: "POST"
                path: "/api/v1/subnet.*"
              - method: "OPTIONS"
                path: "/api/v1/subnet.*"
    - toEndpoints:
        - matchLabels:
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": frontend
            "k8s:app.kubernetes.io/name": subnetcalc-frontend
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: subnetcalc-api-http-routes
spec:
  description: >-
    The subnetcalc API receives traffic only from the APIM simulator,
    never from the router directly.
  endpointSelector:
    matchLabels:
      "k8s:project": kindlocal
      "k8s:team": dolphin
      "k8s:app": subnetcalc
      "k8s:tier": backend
      "k8s:app.kubernetes.io/name": subnetcalc-api
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": apim
            "k8s:project": kindlocal
            "k8s:team": dolphin
            "k8s:app": subnetcalc
            "k8s:tier": gateway
            "k8s:app.kubernetes.io/name": subnetcalc-apim-simulator
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/api/v1/health.*"
              - method: "POST"
                path: "/api/v1/ipv4/.*"
              - method: "OPTIONS"
                path: "/api/v1/ipv4/.*"
              - method: "GET"
                path: "/api/v1/subnet.*"
              - method: "POST"
                path: "/api/v1/subnet.*"
              - method: "OPTIONS"
                path: "/api/v1/subnet.*"
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            "k8s:app.kubernetes.io/name": otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
