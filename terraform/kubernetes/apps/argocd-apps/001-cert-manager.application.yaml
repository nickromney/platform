apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.0
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
        webhook:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
        cainjector:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
        startupapicheck:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
