metadata:
  name: ccnp-stage-allow-dns
  annotations:
    policies.cilium.io/title: Stage allow DNS
    platform.publiccloudexperiments.net/source-kind: CiliumClusterwideNetworkPolicy
specs:
  - description: Plumbing baseline for application stages. Allows labeled application workloads in sandbox, dev, and uat to resolve DNS through kube-dns or CoreDNS in kube-system and enables the DNS proxy path needed by later FQDN rules.
    endpointSelector:
      matchExpressions:
        - key: k8s:io.kubernetes.pod.namespace
          operator: In
          values:
            - sandbox
            - dev
            - uat
        - key: k8s:project
          operator: Exists
        - key: k8s:team
          operator: Exists
        - key: k8s:app
          operator: Exists
        - key: k8s:tier
          operator: In
          values:
            - gateway
            - frontend
            - backend
        - key: k8s:app.kubernetes.io/name
          operator: Exists
    egress:
      - toEndpoints:
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: kube-system
              k8s:k8s-app: kube-dns
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: kube-system
              k8s:app.kubernetes.io/name: coredns
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: '*'
