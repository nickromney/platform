apiVersion: v1
kind: Service
metadata:
  name: grafana-ui
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "110"
  labels:
    app.kubernetes.io/name: grafana-ui
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30302
