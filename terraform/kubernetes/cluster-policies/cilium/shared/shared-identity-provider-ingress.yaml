apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: shared-identity-provider-ingress
spec:
  description: >-
    Reusable ingress policy for in-cluster OIDC providers in namespace-role=shared.
    Application, shared, and platform namespaces can use the same OIDC discovery,
    token, JWKS, and userinfo ports without baking the current sso namespace name
    into every policy.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - shared
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - dex
          - keycloak
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": application
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": shared
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role": platform
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
            - port: "8080"
              protocol: TCP
