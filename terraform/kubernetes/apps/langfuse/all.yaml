apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-minio
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-minio
    app.kubernetes.io/component: minio
spec:
  serviceName: langfuse-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-minio
        app.kubernetes.io/component: minio
    spec:
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: create-bucket-dir
          image: cgr.dev/chainguard/busybox:latest
          command: ["mkdir", "-p", "/data/langfuse"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: cgr.dev/chainguard/minio:latest
          args:
            - server
            - --address
            - :9000
            - --console-address
            - :9001
            - /data
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: minio-root-password
          startupProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 384Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
