apiVersion: v1
kind: Pod
metadata:
  name: aks-ai-direct-egress-probe
  namespace: aks-sim
  labels:
    app.kubernetes.io/name: aks-ai-direct-egress-probe
    app.kubernetes.io/component: ai-workload
    app.kubernetes.io/part-of: kind-aks-ai-foundry
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  nodeSelector:
    kubernetes.azure.com/agentpool: experiment
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: probe
      image: docker.io/curlimages/curl:8.19.0
      imagePullPolicy: Never
      command:
        - sh
        - -ec
      args:
        - |
          if curl -fsS --connect-timeout 2 --max-time 3 http://host.docker.internal:8100/apim/health >/dev/null 2>&1; then
            echo "unexpected direct APIM access" >&2
            exit 1
          fi
          if curl -fsS --connect-timeout 2 --max-time 3 http://host.docker.internal:8020/foundry/health >/dev/null 2>&1; then
            echo "unexpected direct AI Foundry access" >&2
            exit 1
          fi
          echo "direct external egress from workload: denied"
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
          ephemeral-storage: 8Mi
        limits:
          cpu: 50m
          memory: 32Mi
          ephemeral-storage: 32Mi
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
