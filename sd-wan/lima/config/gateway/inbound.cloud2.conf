# Inbound gateway - Cloud2 (on-prem)
# Key gateway: serves api1.vanity.test for cross-cloud mTLS access

server {
    listen 172.16.11.2:8443 ssl http2;
    listen 10.10.1.60:8443 ssl http2;
    server_name inbound.cloud2.test api1.vanity.test api1.cloud2.test;

    # Server cert - SANs include api1.vanity.test
    ssl_certificate     /etc/pki/server-fullchain.crt;
    ssl_certificate_key /etc/pki/server.key;

    # mTLS - verify client against shared root CA
    ssl_client_certificate /etc/pki/root-ca.crt;
    ssl_verify_client on;

    # Mozilla Modern profile: TLS 1.3 only
    # https://wiki.mozilla.org/Security/Server_Side_TLS#Modern_compatibility
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_prefer_server_ciphers off;

    # HSTS: 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pass client identity to backend
    proxy_set_header X-Client-CN $ssl_client_s_dn;
    proxy_set_header X-Client-Verify $ssl_client_verify;

    location / {
        # Backend also uses mTLS (inbound -> api1)
        proxy_pass http://10.10.1.4:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Ingress-Cloud cloud2;
    }
}

# HTTP redirect to HTTPS
server {
    listen 172.16.11.2:8080;
    listen 10.10.1.60:8080;
    server_name inbound.cloud2.test api1.vanity.test api1.cloud2.test;
    return 301 https://$host$request_uri;
}
