iled artefacts, not build</tspan><tspan x="372.000000" dy="21.200000">toolchains</tspan><tspan x="372.000000" dy="21.200000">Container restrictions</tspan><tspan x="372.000000" dy="21.200000">non-root, read-only FS, dropped</tspan><tspan x="372.000000" dy="21.200000">capabilities</tspan></text></g><g class="bjA4"><g class="shape" ><rect x="12.000000" y="1706.000000" width="720.000000" height="164.000000" rx="10.000000" stroke="#0D32B2" fill="#F7F8FE" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="372.000000" y="1765.000000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:20px"><tspan x="372.000000" dy="0.000000">Cilium and Kyverno controls</tspan><tspan x="372.000000" dy="21.500000">default-deny, L7 policy, labels,</tspan><tspan x="372.000000" dy="21.500000">admission defaults</tspan><tspan x="372.000000" dy="21.500000">Evidence and checks</tspan></text></g><g class="KG4wMSAtJmd0OyBuMDIpWzBd"><marker id="mk-d2-1075049718-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#0D32B2" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 372.000000 206.000000 L 372.000000 270.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1075049718-3488378134)" mask="url(#d2-1075049718)" /></g><g class="KG4wMiAtJmd0OyBuMDMpWzBd"><path d="M 372.000000 412.000000 L 372.000000 476.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1075049718-3488378134)" mask="url(#d2-1075049718)" /></g><g class="KG4wMyAtJmd0OyBuMDQpWzBd"><path d="M 372.000000 646.000000 L 372.000000 710.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1075049718-3