apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-sim
  namespace: dev
  labels:
    app: chatgpt-sim
    app.kubernetes.io/name: chatgpt-sim
    app.kubernetes.io/component: chatgpt-sim
    project: kindlocal
    team: platform
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatgpt-sim
      app.kubernetes.io/component: chatgpt-sim
  template:
    metadata:
      labels:
        app: chatgpt-sim
        app.kubernetes.io/name: chatgpt-sim
        app.kubernetes.io/component: chatgpt-sim
        project: kindlocal
        team: platform
        tier: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: gitea-registry-creds
      containers:
        - name: server
          image: localhost:30090/platform/chatgpt-sim:0.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: PUBLIC_BASE_URL
              value: https://chatgpt.dev.127.0.0.1.sslip.io
            - name: MCP_URL
              value: https://mcpserver.dev.127.0.0.1.sslip.io/mcp
            - name: MCP_INTERNAL_URL
              value: http://subnetcalc-apim-simulator.apim.svc.cluster.local:8000/mcp
            - name: LLM_URL
              value: http://agentgateway-ai-gateway.agentgateway-system.svc.cluster.local/v1/chat/completions
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 256Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: chatgpt-sim
  namespace: dev
  labels:
    app: chatgpt-sim
    app.kubernetes.io/name: chatgpt-sim
    app.kubernetes.io/component: chatgpt-sim
    project: kindlocal
    team: platform
    tier: frontend
spec:
  selector:
    app.kubernetes.io/name: chatgpt-sim
    app.kubernetes.io/component: chatgpt-sim
  ports:
    - name: http
      appProtocol: http
      port: 8080
      targetPort: http
