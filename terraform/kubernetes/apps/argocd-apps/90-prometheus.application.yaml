apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "90"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 28.16.0
    helm:
      releaseName: prometheus
      values: |
        alertmanager:
          enabled: false
        configmapReload:
          prometheus:
            image:
              repository: dhi.io/prometheus-config-reloader
              tag: 0.89.0-debian13
        kube-state-metrics:
          enabled: true
          image:
            registry: dhi.io
            repository: kube-state-metrics
            tag: 2.18.0-debian13
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
        prometheus-node-exporter:
          enabled: true
          image:
            registry: dhi.io
            repository: node-exporter
            tag: 1.10.2-debian13
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
        prometheus-pushgateway:
          enabled: false
        server:
          image:
            repository: dhi.io/prometheus
            tag: 3.11.0-debian13
          persistentVolume:
            enabled: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          extraFlags:
            - enable-feature=promql-at-modifier
            - enable-feature=extra-scrape-metrics
            - web.enable-lifecycle
            - web.enable-remote-write-receiver
          retention: 6h
        extraScrapeConfigs: |
          - job_name: argocd-metrics
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - argocd
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
                action: keep
                regex: argocd
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                action: keep
                regex: metrics
              - source_labels: [__meta_kubernetes_pod_phase]
                action: drop
                regex: Pending|Succeeded|Failed|Completed
          - job_name: hubble-metrics
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - kube-system
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                action: keep
                regex: cilium
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - replacement: "9965"
                target_label: __address__
                source_labels: [__address__]
                regex: (.+):\d+
                action: replace
              - replacement: "$1:9965"
                target_label: __address__
                source_labels: [__address__]
                regex: (.+)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
