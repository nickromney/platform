  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentiment-auth-ui
        app.kubernetes.io/component: frontend
        app: sentiment
        project: kindlocal
        team: dolphin
        tier: frontend
        role: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
