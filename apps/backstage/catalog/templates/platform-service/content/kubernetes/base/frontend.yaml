apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}-frontend
  labels:
    app.kubernetes.io/name: ${{ values.name }}-frontend
    app.kubernetes.io/component: frontend
    app: ${{ values.name }}
    project: kindlocal
    team: ${{ values.team }}
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${{ values.name }}-frontend
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.name }}-frontend
        app.kubernetes.io/component: frontend
        app: ${{ values.name }}
        project: kindlocal
        team: ${{ values.team }}
        tier: frontend
    spec:
      imagePullSecrets:
        - name: gitea-registry-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: localhost:30090/platform/${{ values.name }}-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: ${{ values.frontendPort }}
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}-frontend
  labels:
    app.kubernetes.io/name: ${{ values.name }}-frontend
    app.kubernetes.io/component: frontend
    app: ${{ values.name }}
    project: kindlocal
    team: ${{ values.team }}
    tier: frontend
spec:
  selector:
    app.kubernetes.io/name: ${{ values.name }}-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      appProtocol: http
      port: ${{ values.frontendPort }}
      targetPort: http
