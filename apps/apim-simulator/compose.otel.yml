x-lgtm-proxy-hardening: &lgtm-proxy-hardening
  init: true
  read_only: true
  user: "${NGINX_UID:-101}:${NGINX_GID:-101}"
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=1777
    - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
    - /run/nginx:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
    - /var/run:rw,noexec,nosuid,nodev,uid=${NGINX_UID:-101},gid=${NGINX_GID:-101},mode=0755
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  lgtm:
    image: grafana/otel-lgtm:0.24.0@sha256:a7fbde2893d86ae4807701bc482736243e584eb90b5faa273d291ffff2a1374f
    init: true
    read_only: true
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    environment:
      ENABLE_LOGS_ALL: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_ROOT_URL: "${GRAFANA_BASE_URL:-https://lgtm.apim.127.0.0.1.sslip.io:8443}"
    volumes:
      - lgtm-data:/data
      - ./observability/grafana/provisioning/dashboards/apim-simulator.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/apim-simulator.yaml:ro
      - ./observability/grafana/dashboards:/otel-lgtm/custom-dashboards:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - apim

  lgtm-proxy:
    <<: *lgtm-proxy-hardening
    image: ${EDGE_PROXY_IMAGE:-dhi.io/nginx:1.29.5-debian13}
    depends_on:
      lgtm:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-8443}:8443"
    volumes:
      - ./observability/lgtm/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./examples/edge/certs:/etc/nginx/certs:ro
    networks:
      - apim

  apim-simulator:
    environment:
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_DEPLOYMENT_ENVIRONMENT: local
      OTEL_SERVICE_NAMESPACE: apim-simulator
    depends_on:
      lgtm:
        condition: service_started

volumes:
  lgtm-data:
