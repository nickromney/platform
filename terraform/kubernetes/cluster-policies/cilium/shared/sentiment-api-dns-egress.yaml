apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-sentiment-llm-dns-egress
spec:
  description: |
    Allow sentiment backend and LLM broker pods in dev and uat to perform DNS
    lookups. Required for in-cluster service discovery and for direct-mode
    ExternalName resolution when the host-backed gateway is selected.
  endpointSelector:
    matchExpressions:
      - key: "k8s:project"
        operator: In
        values:
          - kindlocal
      - key: "k8s:team"
        operator: In
        values:
          - dolphin
      - key: "k8s:app"
        operator: In
        values:
          - sentiment-llm
      - key: "k8s:role"
        operator: In
        values:
          - backend
          - llm
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - application
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": "kube-system"
            "k8s:k8s-app": "kube-dns"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
