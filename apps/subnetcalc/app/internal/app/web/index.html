<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPv4 Subnet Calculator</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@social-5h3ll/5h3ll-ui@0.1.4/dist/5h3ll_ui.cdn.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@social-5h3ll/5h3ll-ui@0.1.4/dist/js/all.min.js" defer></script>
    <link rel="stylesheet" href="/app-shell.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
      <div>
        <h1>IPv4 Subnet Calculator</h1>
        <p>Vanilla HTML, CSS, JavaScript, and a Go API.</p>
      </div>
      <div class="header-actions">
        <p id="auth-state" class="auth-state">Not signed in.</p>
        <button id="logout-btn" class="sign-in-link" type="button" hidden>Sign Out</button>
        <button id="theme-switcher" class="theme-toggle" type="button" aria-label="Theme: system. Switch to light theme." title="Theme: system. Switch to light theme." data-theme-choice="system"></button>
      </div>
    </header>
    <main id="main" tabindex="-1">
      <section id="api-status" class="app-panel notice" role="status" aria-live="polite">Checking API...</section>

      <form id="lookup-form" class="app-panel">
        <label for="ip-address">IP Address or CIDR Range</label>
        <div class="form-row">
          <input id="ip-address" name="address" placeholder="e.g., 192.168.1.1 or 10.0.0.0/24" required>
          <label class="sr-only" for="cloud-mode">Subnet mode</label>
          <select id="cloud-mode" name="mode">
            <option value="Standard">Standard</option>
            <option value="AWS">AWS</option>
            <option value="Azure" selected>Azure</option>
            <option value="OCI">OCI</option>
          </select>
          <button id="lookup-btn" type="submit">Lookup</button>
        </div>
        <div class="examples" aria-label="Examples">
          <button type="button" data-example="10.0.0.0/24">RFC1918: 10.0.0.0/24</button>
          <button type="button" data-example="100.64.0.1">RFC6598: 100.64.0.1</button>
          <button type="button" data-example="8.8.8.8">Public: 8.8.8.8</button>
          <button type="button" data-example="104.16.1.1">Cloudflare: 104.16.1.1</button>
          <button type="button" data-example="192.168.1.0/24">Network: 192.168.1.0/24</button>
        </div>
      </form>

      <form id="provider-form" class="app-panel" aria-labelledby="provider-range-title">
        <h2 id="provider-range-title">Provider Range Check</h2>
        <label for="provider-address">Address</label>
        <div class="form-row">
          <input id="provider-address" name="address" placeholder="e.g., 3.5.140.1 or 104.16.1.1" required>
          <label class="sr-only" for="provider-name">Provider</label>
          <select id="provider-name" name="provider">
            <option value="cloudflare">Cloudflare</option>
            <option value="aws">AWS</option>
            <option value="azure">Azure</option>
            <option value="stripe">Stripe</option>
            <option value="openai">OpenAI</option>
          </select>
          <button id="provider-btn" type="submit">Check</button>
        </div>
      </form>

      <section id="auth-panel" class="app-panel" aria-labelledby="identity-title">
        <h2 id="identity-title">Identity</h2>
        <form id="identity-form">
          <label class="sr-only" for="token-input">Bearer token</label>
          <input id="token-input" name="token" type="password" autocomplete="off" placeholder="Paste bearer token">
          <div class="auth-actions">
            <button id="whoami-btn" type="submit">Validate Token</button>
          </div>
        </form>
      </section>

      <section id="results" class="app-panel" tabindex="-1" aria-live="polite" aria-labelledby="results-title" hidden>
        <h2 id="results-title">Results</h2>
        <div id="results-content"></div>
      </section>
    </main>
    <script src="/runtime-config.js"></script>
    <script src="/idpauth.js"></script>
    <script src="/app-shell.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
