services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    profiles: ["sso"]
    entrypoint: ["/bin/sh", "/opt/keycloak/local/start-with-templated-realm.sh"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-demo@admin.test}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      OAUTH2_PROXY_CLIENT_SECRET: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      KEYCLOAK_DEMO_PASSWORD: ${PLATFORM_DEMO_PASSWORD:-local-dev-password}
    ports:
      - "${SUBNETCALC_KEYCLOAK_PORT:-8400}:8080"
    volumes:
      - ../shared/keycloak/realm-export.json:/opt/keycloak/local/realm-export.template.json:ro
      - ../shared/keycloak/start-with-templated-realm.sh:/opt/keycloak/local/start-with-templated-realm.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 600s

  subnetcalc-backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: subnetcalc-go:latest
    platform: ${SUBNETCALC_LOCAL_PLATFORM:-linux/amd64}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    ports:
      - "${SUBNETCALC_BACKEND_PORT:-8090}:8080"
    environment:
      RUNTIME_ROLE: backend
      AUTH_METHOD: ${SUBNETCALC_BACKEND_AUTH_METHOD:-none}
      OIDC_ISSUER_URL: ${SUBNETCALC_OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${SUBNETCALC_OIDC_AUDIENCE:-api-app}
      OIDC_JWKS_URI: ${SUBNETCALC_OIDC_JWKS_URI:-}
      PORT: "8080"
      HOME: /tmp
    healthcheck:
      test: ["CMD", "/subnetcalc", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  subnetcalc-frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: subnetcalc-go:latest
    platform: ${SUBNETCALC_LOCAL_PLATFORM:-linux/amd64}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
    ports:
      - "${SUBNETCALC_FRONTEND_PORT:-8003}:8080"
    environment:
      RUNTIME_ROLE: frontend
      BACKEND_URL: http://subnetcalc-backend:8080
      AUTH_METHOD: ${SUBNETCALC_FRONTEND_AUTH_METHOD:-none}
      API_AUTH_METHOD: ${SUBNETCALC_BACKEND_AUTH_METHOD:-none}
      OIDC_ISSUER_URL: ${SUBNETCALC_OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${SUBNETCALC_OIDC_AUDIENCE:-api-app}
      OIDC_JWKS_URI: ${SUBNETCALC_OIDC_JWKS_URI:-}
      OIDC_CLIENT_ID: ${SUBNETCALC_OIDC_CLIENT_ID:-frontend-app}
      OIDC_REDIRECT_URI: ${SUBNETCALC_OIDC_REDIRECT_URI:-http://localhost:8003/}
      SHOW_NETWORK_PATH: ${SUBNETCALC_SHOW_NETWORK_PATH:-true}
      NETWORK_HOPS: ${SUBNETCALC_NETWORK_HOPS:-}
      PORT: "8080"
      HOME: /tmp
    depends_on:
      subnetcalc-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/subnetcalc", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 3s

  edge:
    image: dhi.io/nginx:1.29.5-debian13
    profiles: ["sso"]
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=65532,gid=65532,mode=1777
      - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532
      - /var/run/nginx:rw,noexec,nosuid,nodev,uid=65532,gid=65532
    volumes:
      - ./edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    depends_on:
      subnetcalc-backend:
        condition: service_healthy
      subnetcalc-frontend:
        condition: service_healthy

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3@sha256:10a1165743a192e1940b4708fb9647027185ce11a681a1c5519b442ff7f1f561
    profiles: ["sso"]
    restart: unless-stopped
    ports:
      - "${SUBNETCALC_PUBLIC_PORT:-8003}:4180"
    environment:
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
    command:
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=http://localhost:${SUBNETCALC_KEYCLOAK_PORT:-8400}/realms/platform
      - --login-url=http://localhost:${SUBNETCALC_KEYCLOAK_PORT:-8400}/realms/platform/protocol/openid-connect/auth?max_age=0
      - --redeem-url=http://keycloak:8080/realms/platform/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/platform/protocol/openid-connect/certs
      - --validate-url=http://keycloak:8080/realms/platform/protocol/openid-connect/userinfo
      - --client-id=oauth2-proxy
      - --client-secret=${PLATFORM_DEMO_PASSWORD:-local-dev-password}
      - --redirect-url=http://localhost:${SUBNETCALC_PUBLIC_PORT:-8003}/oauth2/callback
      - --code-challenge-method=S256
      - --upstream=http://edge:8080
      - --http-address=0.0.0.0:4180
      - --cookie-secure=false
      - --cookie-httponly=true
      - --cookie-expire=4h
      - --cookie-refresh=1h
      - --email-domain=*
      - --scope=openid email profile
      - --oidc-groups-claim=groups
      - --allowed-group=app-subnetcalc-dev
      - --allowed-group=platform-admins
      - --pass-access-token=true
      - --pass-user-headers=true
      - --set-authorization-header=true
      - --set-xauthrequest=true
      - --standard-logging=true
      - --auth-logging=true
      - --request-logging=true
      - --upstream-timeout=180s
      - --skip-auth-regex=^/(signed-out\.html|app-shell\.css|favicon\.svg|favicon\.ico)$
      - --reverse-proxy=true
      - --skip-provider-button=true
    depends_on:
      - keycloak
      - edge
