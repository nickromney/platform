# Compose configuration for Static HTML Frontend only
# Works with both podman-compose and docker compose
#
# Note: This frontend proxies API requests to API_PROXY_UPSTREAM.
# You need to run a compatible backend separately on the same compose network.
#
# Usage:
#   podman-compose up
#   docker compose up
#
# Access:
#   Frontend: http://localhost:8001

services:
  frontend-html-static:
    build:
      context: ..
      dockerfile: ./frontend-html-static/Dockerfile
    image: subnetcalc-frontend-html-static:latest
    ports:
      - "8001:8081"
    environment:
      - API_PROXY_UPSTREAM=${API_PROXY_UPSTREAM:-http://api-fastapi-container-app:8000}
      - NGINX_TEMPLATE_PATH=/usr/share/nginx/templates/subnetcalc.conf.template
      - NGINX_CONFIG_OUT=/tmp/nginx.conf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/"]
      interval: 10s
      timeout: 3s
      retries: 3
