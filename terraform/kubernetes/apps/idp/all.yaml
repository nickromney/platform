apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
    app: idp-core
    project: kindlocal
    team: platform
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-core
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-core
        app.kubernetes.io/component: api
        app: idp-core
        project: kindlocal
        team: platform
        tier: backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: localhost:30090/platform/idp-core:latest
          imagePullPolicy: Always
          env:
            - name: IDP_RUNTIME
              value: kind
            - name: IDP_PUBLIC_URL
              value: https://portal.127.0.0.1.sslip.io
            - name: IDP_API_PUBLIC_URL
              value: https://portal-api.127.0.0.1.sslip.io
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
    app: idp-core
    project: kindlocal
    team: platform
    tier: backend
spec:
  selector:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-portal
  labels:
    app.kubernetes.io/name: idp-portal
    app.kubernetes.io/component: frontend
    app: idp-portal
    project: kindlocal
    team: platform
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-portal
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-portal
        app.kubernetes.io/component: frontend
        app: idp-portal
        project: kindlocal
        team: platform
        tier: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: localhost:30090/platform/idp-portal:latest
          imagePullPolicy: Always
          env:
            - name: VITE_IDP_API_BASE_URL
              value: https://portal-api.127.0.0.1.sslip.io
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: idp-portal
  labels:
    app.kubernetes.io/name: idp-portal
    app.kubernetes.io/component: frontend
    app: idp-portal
    project: kindlocal
    team: platform
    tier: frontend
spec:
  selector:
    app.kubernetes.io/name: idp-portal
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
