services:
  mock-backend:
    build:
      context: ./examples/mock-backend
      dockerfile: Dockerfile
    image: apim-simulator-mock-backend:latest
    expose:
      - "8080"
    networks:
      - apim

  apim-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: apim-simulator:latest
    expose:
      - "8000"
    environment:
      APIM_CONFIG_PATH: ${APIM_CONFIG_PATH:-/app/examples/basic.json}
      OTEL_SERVICE_NAME: apim-simulator
    depends_on:
      mock-backend:
        condition: service_started
    networks:
      - apim

networks:
  apim:
