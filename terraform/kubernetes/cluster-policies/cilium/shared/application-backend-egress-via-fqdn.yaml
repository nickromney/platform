apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-application-backend-egress-via-fqdn
spec:
  description: >-
    Allow only the real app backends in application namespaces to egress to
    approved FQDNs over HTTPS. Frontends and gateways stay on their explicit
    next-hop policies instead of inheriting this broader external egress path.
    Include a DNS L7 rule so Cilium can observe and cache the hostname
    resolution for these FQDN-pinned destinations.
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.cilium.k8s.namespace.labels.platform.publiccloudexperiments.net/namespace-role"
        operator: In
        values:
          - application
      - key: "k8s:app.kubernetes.io/name"
        operator: In
        values:
          - sentiment-api
          - subnetcalc-api
      - key: "k8s:project"
        operator: In
        values:
          - kindlocal
      - key: "k8s:team"
        operator: In
        values:
          - dolphin
      - key: "k8s:tier"
        operator: In
        values:
          - backend
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: api.github.com
        - matchPattern: "*.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
