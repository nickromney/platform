apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  namespace: langfuse
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/component: postgres
spec:
  serviceName: langfuse-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/postgres:17.6-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
          startupProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
